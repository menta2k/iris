# Server configuration — HOST-NATIVE deployment.
#
# Binds to ALL interfaces by default; tighten to 127.0.0.1 if you're
# fronting this with nginx / Caddy and don't want the API exposed
# externally. The embedded SPA is served from the same listener, so
# any reverse proxy that handles TLS termination just needs to forward
# / to the admin-service backend — no separate static origin.

server:
  rest:
    network: tcp
    addr: 0.0.0.0:8000
    timeout: 10s
    cors:
      headers:
        - "Authorization"
        - "Content-Type"
        - "X-Requested-With"
      origins:
        # Single-origin in prod (the embedded SPA). Add your reverse
        # proxy's public hostname here if it terminates TLS upstream.
        - "http://localhost:8000"
  grpc:
    network: tcp
    addr: 127.0.0.1:9000
    timeout: 10s
