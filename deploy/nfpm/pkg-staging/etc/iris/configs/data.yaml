# Data layer configuration — HOST-NATIVE deployment.
#
# Same shape as backend/app/admin/service/configs/data.yaml but
# hostnames resolve to loopback because PostgreSQL/TimescaleDB and
# Redis are running as system services on the same machine. If you
# point at a remote DB or Redis, edit `source` here.

data:
  database:
    driver: pgx
    source: "postgres://iris:iris@127.0.0.1:5432/iris?sslmode=disable"
    migrate: true
    debug: false
    max_idle_connections: 10
    max_open_connections: 100
    connection_max_lifetime: 600s
  cache:
    driver: redis
    source: "redis://127.0.0.1:6379/0"
    read_timeout: 0.4s
    write_timeout: 0.6s
    dial_timeout: 1s
