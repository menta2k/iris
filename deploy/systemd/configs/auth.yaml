# JWT authentication settings.
#
# WARNING: replace `access_secret` and `refresh_secret` in production via
# environment overrides or a secret manager. Startup validation fails if the
# values remain at the default placeholders.

auth:
  access_token:
    method: HS512
    secret: "REPLACE_ME_ACCESS_SECRET_AT_LEAST_32_BYTES_RANDOM"
    expires_in: 1h
    issuer: "iris"
    audience:
      - "kumo-ui-admin"
  refresh_token:
    method: HS512
    secret: "REPLACE_ME_REFRESH_SECRET_AT_LEAST_32_BYTES_RANDOM"
    expires_in: 168h
    issuer: "iris"
  password:
    bcrypt_cost: 12
  rate_limit:
    login_per_minute: 5
    login_lockout: 15m
