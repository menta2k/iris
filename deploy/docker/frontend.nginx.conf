# Nginx configuration for the Iris frontend.
#
# Serves the built Vue/Vite SPA from /usr/share/nginx/html and proxies the API
# surface (/v1 and /openapi.yaml) to the backend.
#
# The upstream host:port defaults to iris-backend:8080 (the backend service
# name on a shared Docker network). Override it at container start with:
#   -e IRIS_BACKEND_UPSTREAM=http://my-backend:8080
# This file is processed by nginx's envsubst template mechanism (placed in
# /etc/nginx/templates/ as *.conf.template); ${IRIS_BACKEND_UPSTREAM} is
# substituted before nginx starts.

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip for static assets.
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy the JSON API.
    location /v1/ {
        proxy_pass         ${IRIS_BACKEND_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy the generated OpenAPI contract.
    location = /openapi.yaml {
        proxy_pass         ${IRIS_BACKEND_UPSTREAM};
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
