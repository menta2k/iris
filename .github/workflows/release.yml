# Release — runs on a `v*` tag push (e.g. `git tag v2.0.0 && git push --tags`).
#
# Adapted from the v1 (menta2k/iris) release workflow for the v2 stack: a single
# combined image (the Go backend with the Vue SPA embedded, built by
# deploy/docker/backend.Dockerfile) is pushed to GHCR, then a GitHub Release is
# created. GHCR auths with the automatic GITHUB_TOKEN — no PAT needed.

name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # softprops/action-gh-release
  packages: write # push to GHCR

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: Docker → GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name (lowercase)
        id: img
        run: echo "name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          # Repo-root context: the Dockerfile pulls from both backend/ and
          # frontend/ and embeds the built SPA into the binary.
          context: .
          file: deploy/docker/backend.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  packages:
    name: deb + rpm (nfpm)
    needs: [docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name (lowercase)
        id: img
        run: echo "name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract the iris binary from the release image
        # Reuse the exact binary the docker job just built+pushed (frontend SPA
        # embedded) rather than rebuilding — guarantees the package binary is
        # byte-identical to the image. The semver {{version}} tag for v2.0.0 is
        # "2.0.0", i.e. the ref name with the leading "v" stripped.
        run: |
          set -eux
          tag="${GITHUB_REF_NAME#v}"
          image="${REGISTRY}/${{ steps.img.outputs.name }}:${tag}"
          docker pull "$image"
          cid=$(docker create "$image")
          mkdir -p deploy/nfpm/pkg-staging
          docker cp "${cid}:/app/iris" deploy/nfpm/pkg-staging/iris
          docker rm "$cid"
          test -x deploy/nfpm/pkg-staging/iris

      - name: Install nfpm
        # No first-party setup action exists; the goreleaser team ship the
        # binary on releases. Pinned so package layouts stay stable across
        # releases (postinst conventions occasionally drift between majors).
        env:
          NFPM_VERSION: '2.41.3'
        run: |
          set -eux
          curl -fsSL -o /tmp/nfpm.tar.gz \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz"
          tar -xzf /tmp/nfpm.tar.gz -C /tmp nfpm
          sudo install -m 0755 /tmp/nfpm /usr/local/bin/nfpm
          nfpm --version

      - name: Build deb + rpm
        run: |
          set -eux
          export VERSION="${GITHUB_REF_NAME#v}"   # v2.0.0 → 2.0.0
          mkdir -p deploy/nfpm/out
          cd deploy/nfpm
          nfpm package -p deb -f nfpm.yaml -t out/
          nfpm package -p rpm -f nfpm.yaml -t out/
          ls -lh out/

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: iris-packages
          path: deploy/nfpm/out/*
          retention-days: 30

  release:
    name: GitHub Release
    needs: [docker, packages]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download deb + rpm
        uses: actions/download-artifact@v4
        with:
          name: iris-packages
          path: ./dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.deb
            dist/*.rpm
          body: |
            Container image: `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`

            Single image serving the API + embedded admin UI on :8080 (gRPC :9090).

            ## Bare-metal packages

            `.deb` (Debian/Ubuntu) and `.rpm` (RHEL/Rocky/Alma) are attached
            below. They install the `iris` binary to `/usr/local/bin`, a systemd
            unit, and config under `/etc/iris`. After install, fill in
            `/etc/iris/iris.env` then `systemctl enable --now iris`.
