server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets, no-cache for the SPA shell.
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Reverse-proxy /api → admin-service.
    # The admin-service registers /v1/* routes, so we strip the /api prefix
    # before upstream-ing (the trailing slash on proxy_pass does this).
    location /api/ {
        proxy_pass         http://admin-service:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # SPA fallback — let vue-router handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
