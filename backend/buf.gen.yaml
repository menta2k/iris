version: v2
managed:
  enabled: false
plugins:
  - local: protoc-gen-go
    out: api
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: api
    opt: paths=source_relative
  - local: protoc-gen-go-http
    out: api
    opt: paths=source_relative
  - local: protoc-gen-openapi
    out: api/iris/admin/v1
    opt:
      - default_response=false
      - naming=proto
