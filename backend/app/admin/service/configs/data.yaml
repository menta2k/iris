# Data layer configuration: TimescaleDB (Postgres) for primary storage,
# Redis for caching, sessions, and rate limiting.
#
# The hostnames "timescaledb" and "redis" resolve via the docker-compose
# network. For local-host runs (`make run`), override either by editing this
# file or by pointing the binary at an alternate -conf directory.

data:
  database:
    driver: pgx
    source: "postgres://iris:iris@timescaledb:5432/iris?sslmode=disable"
    migrate: true
    debug: false
    max_idle_connections: 10
    max_open_connections: 100
    connection_max_lifetime: 600s
  cache:
    driver: redis
    source: "redis://redis:6379/0"
    read_timeout: 0.4s
    write_timeout: 0.6s
    dial_timeout: 1s
