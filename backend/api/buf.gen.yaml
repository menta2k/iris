version: v2

clean: true

managed:
  enabled: true

  disable:
    - module: buf.build/googleapis/googleapis
    - module: 'buf.build/envoyproxy/protoc-gen-validate'
    - module: 'buf.build/kratos/apis'
    - module: 'buf.build/gnostic/gnostic'
    - module: 'buf.build/tx7do/pagination'

  override:
    # global go_package_prefix
    - file_option: go_package_prefix
      value: github.com/menta2k/iris/backend/api/gen/go

    - file_option: go_package
      path: authentication/service/v1
      value: github.com/menta2k/iris/backend/api/gen/go/authentication/service/v1;authenticationpb
    - file_option: go_package
      path: identity/service/v1
      value: github.com/menta2k/iris/backend/api/gen/go/identity/service/v1;identitypb
    - file_option: go_package
      path: audit/service/v1
      value: github.com/menta2k/iris/backend/api/gen/go/audit/service/v1;auditpb
    - file_option: go_package
      path: kumo/service/v1
      value: github.com/menta2k/iris/backend/api/gen/go/kumo/service/v1;kumopb

plugins:
  - local: protoc-gen-go
    out: gen/go
    opt: paths=source_relative

  - local: protoc-gen-go-grpc
    out: gen/go
    opt:
      - paths=source_relative

  - local: protoc-gen-go-http
    out: gen/go
    opt:
      - paths=source_relative

  - local: protoc-gen-go-errors
    out: gen/go
    opt:
      - paths=source_relative

  - local: protoc-gen-validate
    out: gen/go
    opt:
      - paths=source_relative
      - lang=go
