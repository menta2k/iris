                - IrisAdminService
            description: Mail operations ----------------------------------------------------------
            operationId: IrisAdminService_ListMailRecords
            parameters:
                - name: page.page_size
                  in: query
                  schema:
                    type: integer
                    format: int32
                - name: page.page_token
                  in: query
                  schema:
                    type: string
                - name: mailclass
                  in: query
                  schema:
                    type: string
                - name: sender
                  in: query
                  schema:
                    type: string
                - name: recipient
                  in: query
                  schema:
                    type: string
                - name: vmta_id
                  in: query
                  description: Filters by egress source = the sending VMTA's name (e.g. "vmta-1").
                  schema:
                    type: string
                - name: from_time
                  in: query
                  schema:
                    type: string
                    format: date-time
                - name: to_time
                  in: query
                  schema:
                    type: string
                    format: date-time
                - name: from
                  in: query
                  description: Case-insensitive substring match on the original From header.
                  schema:
                    type: string
                - name: status
                  in: query
                  description: Filter by mail-record status (e.g. "deferred" to see what's in the queue).
                  schema:
                    type: string
                - name: record_type
                  in: query
                  description: Filter by raw KumoMTA log record type (e.g. "AdminBounce"). Empty = all.
                  schema:
                    type: string
                - name: diagnostic
                  in: query
                  description: |-
                    Case-insensitive substring match on the SMTP diagnostic / response text
                     (e.g. "quota", "STARTTLS", "NXDOMAIN"). Empty = all.
                  schema:
                    type: string
                - name: node
                  in: query
                  description: Filter by receiving cluster node name. Empty = all.
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListMailRecordsReply'
