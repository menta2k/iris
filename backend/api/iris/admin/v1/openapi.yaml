components:
    schemas:
        AcmeAccount:
            type: object
            properties:
                email:
                    type: string
                server_url:
                    type: string
                configured:
                    type: boolean
                registered:
                    type: boolean
                updated_at:
                    type: string
        AcmeCertificate:
            type: object
            properties:
                id:
                    type: string
                domain:
                    type: string
                alt_names:
                    type: array
                    items:
                        type: string
                challenge_type:
                    type: string
                cert_path:
                    type: string
                key_path:
                    type: string
                expires_at:
                    type: string
                last_renewed_at:
                    type: string
                status:
                    type: string
                last_error:
                    type: string
        ApplyKumoConfigReply:
