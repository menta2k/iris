            parameters:
                - name: level
                  in: query
                  schema:
                    type: string
                - name: worker
                  in: query
                  schema:
                    type: string
                - name: from
                  in: query
                  schema:
                    type: string
                - name: to
                  in: query
                  schema:
                    type: string
                - name: page.page_size
                  in: query
                  schema:
                    type: integer
                    format: int32
                - name: page.page_token
                  in: query
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListWorkerErrorLogsReply'
