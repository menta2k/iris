        post:
            tags:
                - IrisAdminService
            description: |-
                Logout is a no-op server-side for stateless tokens; provided so clients can
                 signal intent and the action is audited.
            operationId: IrisAdminService_Logout
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/LogoutRequest'
                required: true
            responses:
                "200":
                    description: OK
                    content:
