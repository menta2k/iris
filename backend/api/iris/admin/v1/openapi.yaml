components:
    schemas:
        AcmeAccount:
            type: object
            properties:
                email:
                    type: string
                server_url:
                    type: string
                configured:
                    type: boolean
                registered:
                    type: boolean
                updated_at:
                    type: string
        AcmeCertificate:
            type: object
            properties:
                id:
                    type: string
                domain:
                    type: string
                alt_names:
                    type: array
                    items:
                        type: string
                challenge_type:
                    type: string
                cert_path:
                    type: string
                key_path:
                    type: string
                expires_at:
                    type: string
                last_renewed_at:
                    type: string
                status:
                    type: string
                last_error:
                    type: string
        AcmeDnsProvider:
            type: object
            properties:
                provider:
                    type: string
                config:
                    type: object
                    additionalProperties:
                        type: string
                updated_at:
                    type: string
            description: |-
                The configured DNS-01 provider. On read, config values are redacted to
                 "[stored]" (keys reveal which fields are set); on write, send real values.
        AcmeDnsProviderInfo:
            type: object
            properties:
                name:
                    type: string
                description:
                    type: string
                required_fields:
                    type: array
                    items:
                        type: string
                optional_fields:
                    type: array
                    items:
                        type: string
            description: DNS-01 provider registry metadata (drives the dynamic credentials form).
        ApplyKumoConfigReply:
            type: object
            properties:
                request_id:
                    type: string
                status:
                    type: string
                checksum:
                    type: string
                applied_path:
                    type: string
                result_summary:
                    type: string
                restarted:
                    type: boolean
                    description: restarted is true when KumoMTA was restarted (init change) rather than reloaded.
        ApplyKumoConfigRequest:
            type: object
            properties:
                confirmation_id:
                    type: string
        AuditEntry:
            type: object
            properties:
                id:
                    type: string
                occurred_at:
                    type: string
                actor_user_id:
                    type: string
                operation:
                    type: string
                target_type:
                    type: string
                target_id:
                    type: string
                outcome:
                    type: string
                ip_address:
                    type: string
        Bounce:
            type: object
            properties:
                id:
                    type: string
                event_time:
                    type: string
                    format: date-time
                recipient:
                    type: string
                mailclass:
                    type: string
                smtp_status:
                    type: string
                bounce_type:
                    type: string
                diagnostic:
                    type: string
                processing_state:
                    type: string
                classification:
                    type: string
                    description: |-
                        classification is KumoMTA's bounce-classifier category (InvalidRecipient,
                         SpamBlock, …); empty when the classifier is disabled or no rule matched.
        ChangePasswordReply:
            type: object
            properties: {}
        ChangePasswordRequest:
            type: object
            properties:
                current_password:
                    type: string
                new_password:
                    type: string
        ConfirmMFAReply:
            type: object
            properties:
                enrolled:
                    type: boolean
                token:
                    type: string
            description: |-
                On success a fresh, fully-authenticated session token is returned so the
                 client can complete a first-login enrollment without a second round-trip.
        ConfirmMFARequest:
            type: object
            properties:
                code:
                    type: string
        CreateDKIMDomainRequest:
            type: object
            properties:
                domain:
                    type: string
                selector:
                    type: string
                public_key_fingerprint:
                    type: string
                private_key_ref:
                    type: string
        CreateFeedbackLoopRequest:
            type: object
            properties:
                domain:
                    type: string
                feedback_address:
                    type: string
                forward_address:
                    type: string
                status:
                    type: string
        CreateInboundRouteRequest:
            type: object
            properties:
                name:
                    type: string
                match_type:
                    type: string
                match_value:
                    type: string
                action:
                    type: string
                priority:
                    type: integer
                    format: int32
                status:
                    type: string
                forward_host:
                    type: string
                forward_port:
                    type: integer
                    format: int32
                forward_tls:
                    type: string
                maildir_path:
                    type: string
                destination_url:
                    type: string
                timeout_seconds:
                    type: integer
                    format: int32
                secret_ref:
                    type: string
        CreateListenerRequest:
            type: object
            properties:
                name:
                    type: string
                ip_address:
                    type: string
                port:
                    type: integer
                    format: int32
                hostname:
                    type: string
                tls_enabled:
                    type: boolean
                tls_cert_path:
                    type: string
                tls_key_path:
                    type: string
                require_auth:
                    type: boolean
                max_message_size:
                    type: string
                relay_hosts:
                    type: array
                    items:
                        type: string
                role:
                    type: string
        CreateRoutingRuleRequest:
            type: object
            properties:
                name:
                    type: string
                match_type:
                    type: string
                match_value:
                    type: string
                priority:
                    type: integer
                    format: int32
                target_type:
                    type: string
                target_id:
                    type: string
                match_header:
                    type: string
                assign_mailclass:
                    type: string
        CreateSuppressionRequest:
            type: object
            properties:
                type:
                    type: string
                value:
                    type: string
                reason:
                    type: string
        CreateTLSPolicyRequest:
            type: object
            properties:
                domain:
                    type: string
                mode:
                    type: string
        CreateUserRequest:
            type: object
            properties:
                email:
                    type: string
                display_name:
                    type: string
                mfa_required:
                    type: boolean
                roles:
                    type: array
                    items:
                        type: string
                password:
                    type: string
                    description: |-
                        Initial password. If empty the account is created without a usable
                         password (login disabled until one is set).
        CreateVMTAGroupRequest:
            type: object
            properties:
                name:
                    type: string
                members:
                    type: array
                    items:
                        $ref: '#/components/schemas/VMTAGroupMember'
        CreateVMTARequest:
            type: object
            properties:
                name:
                    type: string
                listener_id:
                    type: string
                max_connections:
                    type: integer
                    format: int32
                ip_address:
                    type: string
                ehlo_name:
                    type: string
        CreateWebhookRuleRequest:
            type: object
            properties:
                name:
                    type: string
                match_type:
                    type: string
                match_value:
                    type: string
                destination_url:
                    type: string
                secret_ref:
                    type: string
                timeout_seconds:
                    type: integer
                    format: int32
        CurrentUserReply:
            type: object
            properties:
                user:
                    $ref: '#/components/schemas/User'
                permissions:
                    type: array
                    items:
                        type: string
        DKIMDomain:
            type: object
            properties:
                id:
                    type: string
                domain:
                    type: string
                selector:
                    type: string
                public_key_fingerprint:
                    type: string
                status:
                    type: string
            description: Domain & recipient safety -------------------------------------------------
        DashboardSummary:
            type: object
            properties:
                service_state:
                    type: string
                queued_messages:
                    type: string
                recent_mail_events:
                    type: string
                recent_audit_events:
                    type: string
        DeleteAcmeCertificateReply:
            type: object
            properties: {}
        DeleteFeedbackLoopReply:
            type: object
            properties: {}
        DeleteInboundRouteReply:
            type: object
            properties:
                ok:
                    type: boolean
        DeleteTLSPolicyReply:
            type: object
            properties: {}
        DiagnoseRequest:
            type: object
            properties:
                from_email:
                    type: string
                recipient:
                    type: string
                mailclass:
                    type: string
            description: 'Tools: Diagnose + RBL check.'
        DiagnoseResult:
            type: object
            properties:
                from_email:
                    type: string
                domain:
                    type: string
                items:
                    type: array
                    items:
                        $ref: '#/components/schemas/DomainCheckItem'
                routing:
                    $ref: '#/components/schemas/RoutingOutcome'
        DisableMFAReply:
            type: object
            properties: {}
        DisableMFARequest:
            type: object
            properties: {}
        DmarcCount:
            type: object
            properties:
                label:
                    type: string
                count:
                    type: integer
                    format: int32
        DmarcDay:
            type: object
            properties:
                date:
                    type: string
                messages:
                    type: integer
                    format: int32
                pass:
                    type: integer
                    format: int32
        DmarcDomainStat:
            type: object
            properties:
                domain:
                    type: string
                messages:
                    type: integer
                    format: int32
                pass:
                    type: integer
                    format: int32
        DmarcReport:
            type: object
            properties:
                org_name:
                    type: string
                report_id:
                    type: string
                domain:
                    type: string
                date_begin:
                    type: string
                date_end:
                    type: string
                policy_p:
                    type: string
                policy_pct:
                    type: integer
                    format: int32
                received_at:
                    type: string
        DmarcSource:
            type: object
            properties:
                ip:
                    type: string
                total:
                    type: integer
                    format: int32
                pass:
                    type: integer
                    format: int32
                fail:
                    type: integer
                    format: int32
        DmarcStats:
            type: object
            properties:
                total_messages:
                    type: integer
                    format: int32
                dmarc_pass:
                    type: integer
                    format: int32
                spf_pass:
                    type: integer
                    format: int32
                dkim_pass:
                    type: integer
                    format: int32
                dispositions:
                    type: array
                    items:
                        $ref: '#/components/schemas/DmarcCount'
                top_sources:
                    type: array
                    items:
                        $ref: '#/components/schemas/DmarcSource'
                domains:
                    type: array
                    items:
                        $ref: '#/components/schemas/DmarcDomainStat'
