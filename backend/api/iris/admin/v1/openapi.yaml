                auto_suppress_hard_bounces:
                    type: boolean
                soft_bounce_threshold:
                    type: integer
                    format: int32
                admin_http_addr:
                    type: string
                    description: |-
                        Iris admin server (applied on restart). admin_http_addr overrides the HTTP
                         bind; admin_tls_enabled serves HTTPS using the issued cert whose domain is
                         admin_tls_cert_domain.
                admin_tls_enabled:
                    type: boolean
                admin_tls_cert_domain:
                    type: string
                acme_renew_interval:
                    type: string
                    description: ACME auto-renew schedule (duration form, e.g. "12h", "30d").
                acme_renew_before:
                    type: string
