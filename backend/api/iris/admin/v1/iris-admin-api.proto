  map<string, string> driver_config = 6;
  string mode = 7;                  // single | batch
  int32 batch_max_size = 8;
  string batch_max_wait = 9;        // duration, e.g. "5s"
  string status = 10;               // active | disabled
  string created_at = 11;
  string updated_at = 12;
