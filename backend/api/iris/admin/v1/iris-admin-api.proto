}

// WidgetCatalogEntry describes one curated metric widget offered in the builder.
message WidgetCatalogEntry {
  string key = 1;
  string category = 2;
  string title = 3;
  string description = 4;
  string unit = 5;
  string viz = 6;               // line | area | bar | gauge | stat
  bool supports_group_by = 7;
  repeated string group_by_labels = 8;
  string default_range = 9;
  bool instant = 10;
}
message ListWidgetCatalogRequest {}
