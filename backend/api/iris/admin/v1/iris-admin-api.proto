  repeated string alt_names = 2;
}
message DeleteAcmeCertificateRequest { string id = 1; }
message DeleteAcmeCertificateReply {}

// DNS-01 provider registry metadata (drives the dynamic credentials form).
message AcmeDnsProviderInfo {
  string name = 1;
  string description = 2;
  repeated string required_fields = 3;
  repeated string optional_fields = 4;
}
message ListAcmeDnsProvidersRequest {}
message ListAcmeDnsProvidersReply { repeated AcmeDnsProviderInfo items = 1; }

// The configured DNS-01 provider. On read, config values are redacted to
// "[stored]" (keys reveal which fields are set); on write, send real values.
message AcmeDnsProvider {
  string provider = 1;
  map<string, string> config = 2;
  string updated_at = 3;
}
message GetAcmeDnsProviderRequest {}
message SetAcmeDnsProviderRequest {
  string provider = 1;
  map<string, string> config = 2;
}
message ClearAcmeDnsProviderRequest {}

message GetAppliedKumoConfigRequest {}
// AppliedKumoConfig is the policy currently running on KumoMTA (last applied).
message AppliedKumoConfig {
  string content = 1;       // full Lua policy; empty when never applied
  string checksum = 2;
  string applied_at = 3;    // RFC3339; empty when never applied
  bool never_applied = 4;
}
message KumoConfigStatusRequest {}
message KumoConfigStatusReply {
  // drift is true when the current configuration differs from the last applied
  // policy (i.e. a regenerate/apply is pending).
  bool drift = 1;
  // never_applied is true when no policy has been applied yet.
  bool never_applied = 2;
  string current_checksum = 3;
  string applied_checksum = 4;
  string applied_at = 5;
  // restart_required is true when the pending change touches the init block
  // (listeners/spool/log hook), which needs a KumoMTA restart, not a reload.
  bool restart_required = 6;
}

message CheckDomainBounceSetupRequest { string domain = 1; }
