  string catalog_key = 2;
  string promql = 3;
  string range = 4;
  string group_by = 5;
}

// GetWarmupDeliveryStats selects the lookback window: "1h" | "6h" | "24h" | "7d"
// (empty defaults to "24h").
message GetWarmupDeliveryStatsRequest {
  string range = 1;
}
// WarmupDeliveryStat is one (VMTA, recipient-domain) row. delivery_rate and
// bounce_rate are fractions in [0,1] over terminal outcomes (sent + bounced);
// deferred is shown separately and is NOT in that denominator.
message WarmupDeliveryStat {
  string vmta_id = 1;          // empty when the egress source has no matching VMTA
  string vmta_name = 2;        // egress source name from the delivery log
  string recipient_domain = 3;
  int64 sent = 4;              // delivered
  int64 bounced = 5;           // permanent failure
  int64 deferred = 6;          // distinct messages that deferred (not attempts); informational, not in rates
  int64 attempted = 7;         // sent + bounced (terminal outcomes)
  double delivery_rate = 8;    // sent / attempted
  double bounce_rate = 9;      // bounced / attempted
}
// DomainDeferredStat is the count of DISTINCT messages that deferred to one
// recipient domain (deduped across VMTAs). Unlike the per-VMTA rows, these
// numbers are summable — a message that retried across several IPs counts once.
message DomainDeferredStat {
  string recipient_domain = 1;
  int64 messages = 2;
}
message WarmupDeliveryStats {
  repeated WarmupDeliveryStat rows = 1;
  string range = 2;            // echoed effective range
  int64 since = 3;             // unix seconds: window start
  // Distinct messages deferred per recipient domain (deduped across VMTAs), so
  // the number reflects "messages deferred", not per-IP retry incidence.
  repeated DomainDeferredStat deferred_by_domain = 4;
}

// GetMailClassStats selects the lookback window: "1h" | "6h" | "24h" | "7d"
// (empty defaults to "24h").
message GetMailClassStatsRequest {
  string range = 1;
}
// MailClassStat is one mailclass with its mail-record counts over the window.
// count is the total records; the delivered/bounced/deferred breakdown lets the
// UI show delivery health per class.
message MailClassStat {
  string mailclass = 1;
  int64 count = 2;             // total mail_records for this class in the window
  int64 delivered = 3;
  int64 bounced = 4;
  int64 deferred = 5;
}
message MailClassStats {
  repeated MailClassStat rows = 1;
  string range = 2;            // echoed effective range
  int64 since = 3;             // unix seconds: window start
}

// GetRecipientDomainStats selects the lookback window: "1h" | "6h" | "24h" |
// "7d" (empty defaults to "24h").
message GetRecipientDomainStatsRequest {
  string range = 1;
}
// RecipientDomainStat is one recipient domain with its mail-record counts over
// the window (the busiest domains, ranked by count).
message RecipientDomainStat {
  string recipient_domain = 1;
  int64 count = 2;             // total mail_records for this domain in the window
  int64 delivered = 3;
  int64 bounced = 4;
  int64 deferred = 5;
}
message RecipientDomainStats {
  repeated RecipientDomainStat rows = 1;
  string range = 2;            // echoed effective range
  int64 since = 3;             // unix seconds: window start
}

// GetQueueTimeHistogram selects the lookback window ("1h" | "6h" | "24h" | "7d",
// empty → "6h") and optionally narrows to one mail class (empty = global).
message GetQueueTimeHistogramRequest {
  string range = 1;
  string mailclass = 2;
}
// QueueTimeBucket is one histogram bucket: the per-bucket (non-cumulative) count
// of deliveries whose queue time fell in (previous upper bound, upper_bound].
message QueueTimeBucket {
  string le = 1;             // Prometheus le label ("0.5", "+Inf")
  double upper_bound = 2;    // parsed le; +Inf for the overflow bucket
  int64 count = 3;
}
message QueueTimeHistogram {
  repeated QueueTimeBucket buckets = 1;
  repeated string mailclasses = 2;      // classes with data (for the selector)
  int64 total_count = 3;
  string range = 4;                     // echoed effective range
  bool prometheus_available = 5;        // false when no Prometheus is configured
}

// Global settings — deployment-level policy knobs an operator edits in the UI.
message GlobalSettings {
  // rspamd inbound spam filtering: "off" | "tag" | "enforce".
  string rspamd_mode = 1;
  string rspamd_url = 2;
  // Default outbound EHLO hostname.
  string egress_ehlo_domain = 3;
  // Redis URL embedded in the policy log_hook (what KumoMTA reaches Redis at).
  string log_stream_redis_url = 4;
  // Default listener binds (host:port) emitted in the policy init.
  string esmtp_listen = 5;
  string http_listen = 6;
  // Delivery rates: the outbound retry schedule (KumoMTA duration form).
  string egress_retry_interval = 7;
  string egress_max_retry_interval = 8;
  string egress_max_age = 9;
  // Bounce / DSN pipeline.
  string bounce_domain = 10;
  bool auto_suppress_hard_bounces = 11;
  int32 soft_bounce_threshold = 12;
  // 13 was fbl_domains; FBL is now a per-entry resource (FeedbackLoop).
  reserved 13;
  // Iris admin server (applied on restart). admin_http_addr overrides the HTTP
  // bind; admin_tls_enabled serves HTTPS using the issued cert whose domain is
  // admin_tls_cert_domain.
  string admin_http_addr = 14;
  bool admin_tls_enabled = 15;
  string admin_tls_cert_domain = 16;
  // ACME auto-renew schedule (duration form, e.g. "12h", "30d").
  string acme_renew_interval = 17;
  string acme_renew_before = 18;
  // Prometheus base URL the dashboard metrics endpoint queries (empty disables).
  string prometheus_url = 19;
  string updated_at = 20;
  string updated_by = 21;
  // Suppression record lifetime (duration form, e.g. "720h", "30d"). Empty =
  // permanent. Applied as the Redis key TTL on the live suppression list.
  string suppression_ttl = 22;
  // DMARC aggregate-report address (advertised as rua=). Empty disables it.
  string dmarc_report_email = 23;
  // Gate FBL auto-suppression on proven provenance (X-KumoRef/send-log/DKIM).
  bool fbl_require_verification = 24;
  // Deployment-wide Maildir root for inbound maildir routes without their own
  // path (one Maildir per recipient under <base>/<domain>/<local-part>).
  string inbound_maildir_base_path = 25;
  // Per-sending-domain bounce (VERP return-path) template. When set, the
  // outbound envelope return-path is derived per From-domain by substituting
  // "{domain}" (e.g. "bounce.kumo.{domain}" → mail from @example.com uses
  // @bounce.kumo.example.com), so SPF aligns with the From-domain. Empty uses the
  // single global bounce_domain for all mail.
  string bounce_domain_template = 26;
  // Subject classification (optional; off by default). classify_subjects is the
  // toggle; classify_model / classify_threshold (0..1) / classify_api_base tune
  // the OpenAI-compatible LLM fallback. The API key comes from
  // IRIS_OPENAI_API_KEY and is never persisted here.
  bool classify_subjects = 27;
  string classify_model = 28;
  double classify_threshold = 29;
  string classify_api_base = 30;
  // Pin a message to one egress IP across retries (deterministic per-message
  // source selection) instead of KumoMTA's per-attempt weighted round-robin.
  bool pin_egress_per_message = 31;
  // Injection listener (GreenArrow-compatible mail-injection API). Applied on
  // restart. injection_enabled turns the dedicated listener on;
  // injection_listen_addr / injection_path set where it binds and answers;
  // injection_tls_enabled serves HTTPS using the issued cert whose domain is
  // injection_tls_cert_domain.
  bool injection_enabled = 32;
  string injection_listen_addr = 33;
  string injection_path = 34;
  bool injection_tls_enabled = 35;
  string injection_tls_cert_domain = 36;
  // Inbox-placement monitoring policy. monitoring_from is the fallback probe
  // sender; the three durations tune the probe pipeline (empty = built-in
  // defaults 1h / 30s / 2h).
  string monitoring_from = 37;
  string monitoring_reconcile_lookback = 38;
  string monitoring_fetch_timeout = 39;
  string monitoring_fetch_giveup = 40;
}
message GetGlobalSettingsRequest {}
message UpdateGlobalSettingsRequest {
  string rspamd_mode = 1;
  string rspamd_url = 2;
  string egress_ehlo_domain = 3;
  string log_stream_redis_url = 4;
  string esmtp_listen = 5;
  string http_listen = 6;
  string egress_retry_interval = 7;
  string egress_max_retry_interval = 8;
  string egress_max_age = 9;
  string bounce_domain = 10;
  bool auto_suppress_hard_bounces = 11;
  int32 soft_bounce_threshold = 12;
  reserved 13; // was fbl_domains
  string admin_http_addr = 14;
  bool admin_tls_enabled = 15;
  string admin_tls_cert_domain = 16;
  string acme_renew_interval = 17;
  string acme_renew_before = 18;
  string prometheus_url = 19;
  string suppression_ttl = 20;
  string dmarc_report_email = 21;
  bool fbl_require_verification = 22;
  string inbound_maildir_base_path = 23;
  // Per-sending-domain bounce return-path template (see GlobalSettings).
  string bounce_domain_template = 24;
  // Subject classification knobs (see GlobalSettings).
  bool classify_subjects = 25;
  string classify_model = 26;
  double classify_threshold = 27;
  string classify_api_base = 28;
  // Pin egress IP per message across retries (see GlobalSettings).
  bool pin_egress_per_message = 29;
  // Injection listener knobs (see GlobalSettings).
  bool injection_enabled = 30;
  string injection_listen_addr = 31;
  string injection_path = 32;
  bool injection_tls_enabled = 33;
  string injection_tls_cert_domain = 34;
  // Inbox-placement monitoring policy (see GlobalSettings).
  string monitoring_from = 35;
  string monitoring_reconcile_lookback = 36;
  string monitoring_fetch_timeout = 37;
  string monitoring_fetch_giveup = 38;
}

// A subject → label classification rule. source is "manual" (operator-authored)
// or "ai" (generated by the LLM fallback and cached). hit_count is how many
// messages matched it. subject_normalized is the trigram matching key.
message SubjectClassification {
  string id = 1;
  string subject = 2;
  string subject_normalized = 3;
  string label = 4;
  string source = 5;
  int64 hit_count = 6;
  string created_at = 7;
  string updated_at = 8;
  // match_type is "similarity" (trigram, default) or "regex" (subject holds a
  // regular expression matched against the raw subject).
  string match_type = 9;
  // priority orders evaluation: higher priority is matched first, first match
  // wins. Default 0.
  int32 priority = 10;
}
message ListSubjectClassificationsRequest {}
message ListSubjectClassificationsReply {
  repeated SubjectClassification items = 1;
}
message CreateSubjectClassificationRequest {
  string subject = 1;
  string label = 2;
  string match_type = 3;
  int32 priority = 4;
}
message UpdateSubjectClassificationRequest {
  string id = 1;
  string subject = 2;
  string label = 3;
  string match_type = 4;
  int32 priority = 5;
}
message DeleteSubjectClassificationRequest {
  string id = 1;
}
message DeleteSubjectClassificationReply {
  bool ok = 1;
}

// InjectionCredential is one API login for the injection listener. The password
// is write-only: it is never returned.
message InjectionCredential {
  string id = 1;
  string username = 2;
  string label = 3;
  bool enabled = 4;
  // allowed_mailclasses restricts which mailclasses the key may inject; empty
  // means any.
  repeated string allowed_mailclasses = 5;
  string last_used_at = 6;
  string created_at = 7;
  string updated_at = 8;
}
message ListInjectionCredentialsRequest {}
message ListInjectionCredentialsReply {
  repeated InjectionCredential items = 1;
}
message CreateInjectionCredentialRequest {
  string username = 1;
  string password = 2;
  string label = 3;
  bool enabled = 4;
  repeated string allowed_mailclasses = 5;
}
message UpdateInjectionCredentialRequest {
  string id = 1;
  string label = 2;
  bool enabled = 3;
  repeated string allowed_mailclasses = 4;
}
message SetInjectionCredentialPasswordRequest {
  string id = 1;
  string password = 2;
}
message DeleteInjectionCredentialRequest {
  string id = 1;
}
message DeleteInjectionCredentialReply {
  bool ok = 1;
}

// ---- Mail provider (inbox-placement) monitoring ----

// MonitoringAccount is a mailbox iris sends probe mail to and later inspects for
// inbox placement. The mailbox password is write-only: it is never returned.
message MonitoringAccount {
  string id = 1;
  string label = 2;
  string provider = 3;   // gmail|outlook|yahoo|custom
  string email = 4;      // probe recipient
  string protocol = 5;   // imap|pop3
  string host = 6;
  int32 port = 7;
  bool tls = 8;
  string username = 9;
  repeated string check_folders = 10;
  string from_address = 11;
  bool schedule_enabled = 12;
  string schedule_interval = 13; // duration form, e.g. "6h"
  string fetch_delay = 14;       // duration form, e.g. "10m"
  bool enabled = 15;
  string last_probe_at = 16;
  string created_at = 17;
  string updated_at = 18;
  // has_password reports whether a mailbox password is stored (the value itself
  // is never returned).
  bool has_password = 19;
  // Last-probe summary (derived, read-only): the most recent probe's send /
  // mailbox status and placement. Empty when there are no probes yet.
  string last_probe_send_status = 20;
  string last_probe_mailbox_status = 21;
  string last_probe_placement = 22;
  // last_probe_verdict is the phase-3 spam-risk verdict (clean|suspicious|spam)
  // from the latest probe's header analysis; empty when not yet analyzed.
  string last_probe_verdict = 23;
}

// MonitoringProbe is one probe message sent to a MonitoringAccount.
message MonitoringProbe {
  string id = 1;
  string account_id = 2;
  string probe_uid = 3;
  string message_id = 4;
  string subject = 5;
  string from_addr = 6;
  string recipient = 7;
  string sent_at = 8;
  string send_status = 9;    // queued|sent|deferred|bounced|error
  string mailbox_status = 10; // pending|found|not_found|timeout|skipped
  string placement = 11;      // inbox|spam|missing|unknown
  string found_at = 12;
  int64 latency_ms = 13;
  string analysis = 14;       // JSON
  string error = 15;
  string created_at = 16;
  string updated_at = 17;
}

message ListMonitoringAccountsRequest {}
message ListMonitoringAccountsReply {
  repeated MonitoringAccount items = 1;
}
message CreateMonitoringAccountRequest {
  string label = 1;
  string provider = 2;
  string email = 3;
  string protocol = 4;
  string host = 5;
  int32 port = 6;
  bool tls = 7;
  string username = 8;
  string password = 9;
  repeated string check_folders = 10;
  string from_address = 11;
  bool schedule_enabled = 12;
  string schedule_interval = 13;
  string fetch_delay = 14;
  bool enabled = 15;
}
message UpdateMonitoringAccountRequest {
  string id = 1;
  string label = 2;
  string provider = 3;
  string email = 4;
  string protocol = 5;
  string host = 6;
  int32 port = 7;
  bool tls = 8;
  string username = 9;
  repeated string check_folders = 10;
  string from_address = 11;
  bool schedule_enabled = 12;
  string schedule_interval = 13;
  string fetch_delay = 14;
  bool enabled = 15;
}
message SetMonitoringAccountPasswordRequest {
  string id = 1;
  string password = 2;
}
message DeleteMonitoringAccountRequest {
  string id = 1;
}
message DeleteMonitoringAccountReply {
  bool ok = 1;
}
message SendMonitoringProbeRequest {
  string account_id = 1;
}
// VerifyMonitoringAccountRequest tests connection + credentials without storing.
// password is used when set; when blank and id is present, the account's stored
// secret is used (test an existing account without re-entering the password).
message VerifyMonitoringAccountRequest {
  string id = 1;
  string protocol = 2;
  string host = 3;
  int32 port = 4;
  bool tls = 5;
  string username = 6;
  string email = 7;
  string password = 8;
}
message VerifyMonitoringAccountReply {
  bool ok = 1;
  string error = 2;
}
message ListMonitoringProbesRequest {
  string account_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}
message ListMonitoringProbesReply {
  repeated MonitoringProbe items = 1;
  string next_page_token = 2;
}
message GetMonitoringProbeRawRequest {
  string id = 1;
}
// MonitoringProbeRaw is a probe's stored raw content for manual analysis.
message MonitoringProbeRaw {
  string id = 1;
  string probe_uid = 2;
  string subject = 3;
  string recipient = 4;
  string raw_headers = 5;
  string raw_message = 6;
}
// ProbeEvent is one timestamped entry in a probe's lifecycle log.
message ProbeEvent {
  string id = 1;
  string at = 2;      // RFC3339
  string phase = 3;   // send | fetch | analyze
  string level = 4;   // info | error
  string message = 5;
}
message ListMonitoringProbeEventsRequest {
  string probe_id = 1;
}
message ListMonitoringProbeEventsReply {
  repeated ProbeEvent items = 1;
}

// ---- System self-monitoring ----
message DiskUsage {
  string path = 1;
  double used_percent = 2;
  uint64 used_bytes = 3;
  uint64 total_bytes = 4;
}
message SystemSnapshot {
  string collected_at = 1; // RFC3339, empty before the first sample
  double cpu_percent = 2;
  double mem_percent = 3;
  uint64 mem_used_bytes = 4;
  uint64 mem_total_bytes = 5;
  repeated DiskUsage disks = 6;
  bool available = 7;
}
message MonitorSettings {
  bool enabled = 1;
  int32 cpu_threshold = 2;  // percent; 0 disables the check
  int32 mem_threshold = 3;
  int32 disk_threshold = 4;
  repeated string disk_paths = 5;
  repeated string notify_emails = 6;
  string from_email = 7;
  string smtp_host = 8;      // host:port (default localhost:25)
  int32 cooldown_minutes = 9;
  int32 sample_seconds = 10;
}
message MonitorAlert {
  string id = 1;
  string resource = 2; // cpu | memory | disk
  string detail = 3;   // disk path (empty for cpu/memory)
  string level = 4;    // breached | recovered
  double value = 5;
  int32 threshold = 6;
  string message = 7;
  bool notified = 8;
  string created_at = 9;
}
// Mount is a real filesystem detected on the host (for the "which disks to
// monitor" picker).
message Mount {
  string path = 1;
  string device = 2;
  string fstype = 3;
  double used_percent = 4;
  uint64 used_bytes = 5;
  uint64 total_bytes = 6;
}
message SystemMonitor {
  SystemSnapshot snapshot = 1;
  MonitorSettings settings = 2;
  repeated MonitorAlert recent_alerts = 3;
  repeated Mount mounts = 4;    // detected filesystems the operator can pick
  string spool_path = 5;        // KumoMTA spool root (suggested monitor path)
}
message GetSystemMonitorRequest {}
message UpdateMonitorSettingsRequest {
  MonitorSettings settings = 1;
}
message TestMonitorNotificationRequest {
  MonitorSettings settings = 1;
}
message TestMonitorNotificationReply {
  bool ok = 1;
  string error = 2;
}

// KumoMTA cluster node registry ----------------------------------------------

// MTANode is one KumoMTA host iris controls. agent_url empty = legacy local
// (co-located) node; proxy_host/proxy_port point at the node's kumo-proxy on
// the private cluster network. version/applied_checksum/last_seen_at are
// agent-reported and read-only.
message MTANode {
  string id = 1;
  string name = 2;
  string agent_url = 3;
  string proxy_host = 4;
  int32 proxy_port = 5;
  string status = 6; // active | disabled | draining
  string cert_fingerprint = 7; // sha256 of enrolled agent cert; read-only
  string version = 8;
  string applied_checksum = 9;
  string last_seen_at = 10;
  string notes = 11;
  // Live kumod state (running/degraded/unreachable/unknown), refreshed by the
  // cluster-health heartbeat worker. Read-only.
  string kumo_state = 12;
}
message ListMTANodesRequest {}
message ListMTANodesReply {
  repeated MTANode items = 1;
}
message GetMTANodeRequest {
  string id = 1;
}
message CreateMTANodeRequest {
  string name = 1;
  string agent_url = 2;
  string proxy_host = 3;
  int32 proxy_port = 4;
  string status = 5;
  string notes = 6;
}
message UpdateMTANodeRequest {
  string id = 1;
  string name = 2;
  string agent_url = 3;
  string proxy_host = 4;
  int32 proxy_port = 5;
  string status = 6;
  string notes = 7;
}
message DeleteMTANodeRequest {
  string id = 1;
}
message DeleteMTANodeReply {
  bool ok = 1;
}
message IssueMTANodeEnrollTokenRequest {
  string id = 1;
}
message IssueMTANodeEnrollTokenReply {
  // Shown once; redeem with `iris cluster enroll` on the node within the TTL.
  string token = 1;
  string expires_at = 2;
}
