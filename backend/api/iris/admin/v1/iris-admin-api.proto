syntax = "proto3";

package iris.admin.v1;

option go_package = "github.com/menta2k/iris/backend/api/iris/admin/v1;adminv1";

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

service IrisAdminService {
  // Listeners (ESMTP) --------------------------------------------------------
  rpc ListListeners(ListListenersRequest) returns (ListListenersReply) {
    option (google.api.http) = { get: "/v1/listeners" };
  }
  rpc CreateListener(CreateListenerRequest) returns (Listener) {
    option (google.api.http) = { post: "/v1/listeners" body: "*" };
  }
  rpc UpdateListener(UpdateListenerRequest) returns (Listener) {
    option (google.api.http) = { put: "/v1/listeners/{id}" body: "*" };
  }

  // Outbound configuration ---------------------------------------------------
  rpc ListVMTAs(ListVMTAsRequest) returns (ListVMTAsReply) {
    option (google.api.http) = { get: "/v1/vmtas" };
  }
  rpc CreateVMTA(CreateVMTARequest) returns (VMTA) {
    option (google.api.http) = { post: "/v1/vmtas" body: "*" };
  }
  rpc UpdateVMTA(UpdateVMTARequest) returns (VMTA) {
    option (google.api.http) = { put: "/v1/vmtas/{id}" body: "*" };
  }
  rpc ListVMTAGroups(ListVMTAGroupsRequest) returns (ListVMTAGroupsReply) {
    option (google.api.http) = { get: "/v1/vmta-groups" };
  }
  rpc CreateVMTAGroups(CreateVMTAGroupRequest) returns (VMTAGroup) {
    option (google.api.http) = { post: "/v1/vmta-groups" body: "*" };
  }
  rpc UpdateVMTAGroup(UpdateVMTAGroupRequest) returns (VMTAGroup) {
    option (google.api.http) = { put: "/v1/vmta-groups/{id}" body: "*" };
  }
  // IP warmup: ramp a VMTA's volume per receiving-domain family over a curve.
  rpc ListWarmupSchedules(ListWarmupSchedulesRequest) returns (ListWarmupSchedulesReply) {
    option (google.api.http) = { get: "/v1/warmup-schedules" };
  }
  rpc CreateWarmupSchedule(CreateWarmupScheduleRequest) returns (WarmupSchedule) {
    option (google.api.http) = { post: "/v1/warmup-schedules" body: "*" };
  }
  rpc UpdateWarmupSchedule(UpdateWarmupScheduleRequest) returns (WarmupSchedule) {
    option (google.api.http) = { put: "/v1/warmup-schedules/{id}" body: "*" };
  }
  rpc PauseWarmupSchedule(PauseWarmupScheduleRequest) returns (WarmupSchedule) {
    option (google.api.http) = { post: "/v1/warmup-schedules/{id}:pause" body: "*" };
  }
  rpc ResumeWarmupSchedule(ResumeWarmupScheduleRequest) returns (WarmupSchedule) {
    option (google.api.http) = { post: "/v1/warmup-schedules/{id}:resume" body: "*" };
  }
  // Delivery blueprints: base per-provider shaping rules (fallback for new IPs).
  rpc ListDeliveryBlueprints(ListDeliveryBlueprintsRequest) returns (ListDeliveryBlueprintsReply) {
    option (google.api.http) = { get: "/v1/delivery-blueprints" };
  }
  rpc CreateDeliveryBlueprint(CreateDeliveryBlueprintRequest) returns (DeliveryBlueprint) {
    option (google.api.http) = { post: "/v1/delivery-blueprints" body: "*" };
  }
  rpc UpdateDeliveryBlueprint(UpdateDeliveryBlueprintRequest) returns (DeliveryBlueprint) {
    option (google.api.http) = { put: "/v1/delivery-blueprints/{id}" body: "*" };
  }
  rpc SetDeliveryBlueprintStatus(SetDeliveryBlueprintStatusRequest) returns (DeliveryBlueprint) {
    option (google.api.http) = { post: "/v1/delivery-blueprints/{id}:status" body: "*" };
  }
  rpc SeedDeliveryBlueprints(SeedDeliveryBlueprintsRequest) returns (SeedDeliveryBlueprintsReply) {
    option (google.api.http) = { post: "/v1/delivery-blueprints:seed-defaults" body: "*" };
  }
  // TSA automation rules (operator-authored reactive back-off).
  rpc ListAutomationRules(ListAutomationRulesRequest) returns (ListAutomationRulesReply) {
    option (google.api.http) = { get: "/v1/automation-rules" };
  }
  rpc CreateAutomationRule(CreateAutomationRuleRequest) returns (AutomationRule) {
    option (google.api.http) = { post: "/v1/automation-rules" body: "*" };
  }
  rpc UpdateAutomationRule(UpdateAutomationRuleRequest) returns (AutomationRule) {
    option (google.api.http) = { put: "/v1/automation-rules/{id}" body: "*" };
  }
  rpc SetAutomationRuleStatus(SetAutomationRuleStatusRequest) returns (AutomationRule) {
    option (google.api.http) = { post: "/v1/automation-rules/{id}:status" body: "*" };
  }
  rpc ListRoutingRules(ListRoutingRulesRequest) returns (ListRoutingRulesReply) {
    option (google.api.http) = { get: "/v1/routing-rules" };
  }
  rpc CreateRoutingRule(CreateRoutingRuleRequest) returns (RoutingRule) {
    option (google.api.http) = { post: "/v1/routing-rules" body: "*" };
  }
  rpc UpdateRoutingRule(UpdateRoutingRuleRequest) returns (RoutingRule) {
    option (google.api.http) = { put: "/v1/routing-rules/{id}" body: "*" };
  }

  // Mail operations ----------------------------------------------------------
  rpc ListMailRecords(ListMailRecordsRequest) returns (ListMailRecordsReply) {
    option (google.api.http) = { get: "/v1/mail-records" };
  }
  rpc ListBounces(ListBouncesRequest) returns (ListBouncesReply) {
    option (google.api.http) = { get: "/v1/bounces" };
  }
  rpc ListFeedbackReports(ListFeedbackReportsRequest) returns (ListFeedbackReportsReply) {
    option (google.api.http) = { get: "/v1/feedback-reports" };
  }
  rpc ListQueues(ListQueuesRequest) returns (ListQueuesReply) {
    option (google.api.http) = { get: "/v1/queues" };
  }
  rpc RequestQueueAction(RequestQueueActionRequest) returns (QueueActionReply) {
    option (google.api.http) = { post: "/v1/queues:action" body: "*" };
  }

  // Domain & recipient safety ------------------------------------------------
  rpc ListDKIMDomains(ListDKIMDomainsRequest) returns (ListDKIMDomainsReply) {
    option (google.api.http) = { get: "/v1/dkim-domains" };
  }
  rpc CreateDKIMDomain(CreateDKIMDomainRequest) returns (DKIMDomain) {
    option (google.api.http) = { post: "/v1/dkim-domains" body: "*" };
  }
  rpc UpdateDKIMDomain(UpdateDKIMDomainRequest) returns (DKIMDomain) {
    option (google.api.http) = { put: "/v1/dkim-domains/{id}" body: "*" };
  }
  // Generate a fresh DKIM key pair. Returns the private key (to save on the
  // domain) and the public DNS TXT record to publish; nothing is persisted.
  rpc GenerateDKIMKey(GenerateDKIMKeyRequest) returns (GenerateDKIMKeyReply) {
    option (google.api.http) = { post: "/v1/dkim-domains:generate-key" body: "*" };
  }
  rpc ListSuppressions(ListSuppressionsRequest) returns (ListSuppressionsReply) {
    option (google.api.http) = { get: "/v1/suppressions" };
  }
  rpc CreateSuppression(CreateSuppressionRequest) returns (Suppression) {
    option (google.api.http) = { post: "/v1/suppressions" body: "*" };
  }
  rpc UpdateSuppression(UpdateSuppressionRequest) returns (Suppression) {
    option (google.api.http) = { put: "/v1/suppressions/{id}" body: "*" };
  }

  // Require-TLS policies (outbound delivery must use TLS for these domains) ---
  rpc ListTLSPolicies(ListTLSPoliciesRequest) returns (ListTLSPoliciesReply) {
    option (google.api.http) = { get: "/v1/tls-policies" };
  }
  rpc CreateTLSPolicy(CreateTLSPolicyRequest) returns (TLSPolicy) {
    option (google.api.http) = { post: "/v1/tls-policies" body: "*" };
  }
  rpc DeleteTLSPolicy(DeleteTLSPolicyRequest) returns (DeleteTLSPolicyReply) {
    option (google.api.http) = { delete: "/v1/tls-policies/{id}" };
  }

  // Inbound automation -------------------------------------------------------
  // Inbound routes (maildir / forward / webhook) — the unified inbound mail
  // routing model. A webhook route POSTs the raw RFC822 message to an endpoint.
  rpc ListInboundRoutes(ListInboundRoutesRequest) returns (ListInboundRoutesReply) {
    option (google.api.http) = { get: "/v1/inbound-routes" };
  }
  rpc CreateInboundRoute(CreateInboundRouteRequest) returns (InboundRoute) {
    option (google.api.http) = { post: "/v1/inbound-routes" body: "*" };
  }
  rpc UpdateInboundRoute(UpdateInboundRouteRequest) returns (InboundRoute) {
    option (google.api.http) = { put: "/v1/inbound-routes/{id}" body: "*" };
  }
  rpc DeleteInboundRoute(DeleteInboundRouteRequest) returns (DeleteInboundRouteReply) {
    option (google.api.http) = { delete: "/v1/inbound-routes/{id}" };
  }
  rpc ListRspamdResults(ListRspamdResultsRequest) returns (ListRspamdResultsReply) {
    option (google.api.http) = { get: "/v1/rspamd-results" };
  }

  // Feedback loops -----------------------------------------------------------
  // Per-domain FBL enrollments: while awaiting approval, inbound feedback mail
  // is forwarded to a human; once approved the domain enables the ARF parser.
  rpc ListFeedbackLoops(ListFeedbackLoopsRequest) returns (ListFeedbackLoopsReply) {
    option (google.api.http) = { get: "/v1/feedback-loops" };
  }
  rpc CreateFeedbackLoop(CreateFeedbackLoopRequest) returns (FeedbackLoop) {
    option (google.api.http) = { post: "/v1/feedback-loops" body: "*" };
  }
  rpc UpdateFeedbackLoop(UpdateFeedbackLoopRequest) returns (FeedbackLoop) {
    option (google.api.http) = { put: "/v1/feedback-loops/{id}" body: "*" };
  }
  rpc DeleteFeedbackLoop(DeleteFeedbackLoopRequest) returns (DeleteFeedbackLoopReply) {
    option (google.api.http) = { delete: "/v1/feedback-loops/{id}" };
  }

  // Authentication -----------------------------------------------------------
  // Login exchanges email + password for a session token. It is exempt from the
  // auth middleware (the operation name contains "Login"). When MFA is required
  // the reply carries a partially-authenticated token plus a status indicating
  // the next step (verify an existing enrollment, or enroll first).
  rpc Login(LoginRequest) returns (LoginReply) {
    option (google.api.http) = { post: "/v1/auth:login" body: "*" };
  }
  // VerifyMFA completes a login by validating a TOTP code, upgrading the
  // partially-authenticated session token to a fully-authenticated one.
  rpc VerifyMFA(VerifyMFARequest) returns (LoginReply) {
    option (google.api.http) = { post: "/v1/auth:verify-mfa" body: "*" };
  }
  // CurrentUser returns the calling user's profile and effective permissions;
  // the SPA calls it on load to restore a session from a stored token.
  rpc CurrentUser(CurrentUserRequest) returns (CurrentUserReply) {
    option (google.api.http) = { get: "/v1/auth:me" };
  }
  // ChangePassword updates the calling user's own password.
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordReply) {
    option (google.api.http) = { post: "/v1/auth:change-password" body: "*" };
  }
  // Logout is a no-op server-side for stateless tokens; provided so clients can
  // signal intent and the action is audited.
  rpc Logout(LogoutRequest) returns (LogoutReply) {
    option (google.api.http) = { post: "/v1/auth:logout" body: "*" };
  }

  // Security administration --------------------------------------------------
  rpc ListUsers(ListUsersRequest) returns (ListUsersReply) {
    option (google.api.http) = { get: "/v1/users" };
  }
  rpc CreateUser(CreateUserRequest) returns (User) {
    option (google.api.http) = { post: "/v1/users" body: "*" };
  }
  rpc UpdateUser(UpdateUserRequest) returns (User) {
    option (google.api.http) = { put: "/v1/users/{id}" body: "*" };
  }
  // ResetUserPassword sets a new password for a user (admin reset). Requires
  // user:write; the new password is strength-validated and bcrypt-hashed.
  rpc ResetUserPassword(ResetUserPasswordRequest) returns (ResetUserPasswordReply) {
    option (google.api.http) = { post: "/v1/users/{id}:reset-password" body: "*" };
  }
  // MFA enrollment for the calling user (TOTP).
  rpc EnrollMFA(EnrollMFARequest) returns (EnrollMFAReply) {
    option (google.api.http) = { post: "/v1/mfa:enroll" body: "*" };
  }
  rpc ConfirmMFA(ConfirmMFARequest) returns (ConfirmMFAReply) {
    option (google.api.http) = { post: "/v1/mfa:confirm" body: "*" };
  }
  rpc DisableMFA(DisableMFARequest) returns (DisableMFAReply) {
    option (google.api.http) = { post: "/v1/mfa:disable" body: "*" };
  }
  rpc ListAuditEntries(ListAuditEntriesRequest) returns (ListAuditEntriesReply) {
    option (google.api.http) = { get: "/v1/audit-entries" };
  }

  // KumoMTA service & configuration ------------------------------------------
  rpc RequestServiceControl(RequestServiceControlRequest) returns (ServiceControlRequest) {
    option (google.api.http) = { post: "/v1/kumomta:service-control" body: "*" };
  }
  // GenerateKumoConfig renders the current Iris configuration into KumoMTA
  // policy without applying it (a preview/diff).
  rpc GenerateKumoConfig(GenerateKumoConfigRequest) returns (KumoConfig) {
    option (google.api.http) = { get: "/v1/kumomta/config:generate" };
  }
  // ApplyKumoConfig renders the configuration, writes it to KumoMTA, and
  // reloads the service. High-risk: requires confirmation and is audited.
  rpc ApplyKumoConfig(ApplyKumoConfigRequest) returns (ApplyKumoConfigReply) {
    option (google.api.http) = { post: "/v1/kumomta/config:apply" body: "*" };
  }
  // KumoConfigStatus reports whether the current configuration has drifted from
  // the last applied policy (a regenerate/apply is pending).
  rpc KumoConfigStatus(KumoConfigStatusRequest) returns (KumoConfigStatusReply) {
    option (google.api.http) = { get: "/v1/kumomta/config:status" };
  }

  // ACME (Let's Encrypt) -------------------------------------------------------
  rpc GetAcmeAccount(GetAcmeAccountRequest) returns (AcmeAccount) {
    option (google.api.http) = { get: "/v1/acme/account" };
  }
  rpc SaveAcmeAccount(SaveAcmeAccountRequest) returns (AcmeAccount) {
    option (google.api.http) = { put: "/v1/acme/account" body: "*" };
  }
  rpc ListAcmeCertificates(ListAcmeCertificatesRequest) returns (ListAcmeCertificatesReply) {
    option (google.api.http) = { get: "/v1/acme/certificates" };
  }
  // RequestAcmeCertificate issues (or re-issues) a certificate via HTTP-01.
  // Synchronous: blocks for the ACME handshake.
  rpc RequestAcmeCertificate(RequestAcmeCertificateRequest) returns (AcmeCertificate) {
    option (google.api.http) = { post: "/v1/acme/certificates" body: "*" };
  }
  rpc DeleteAcmeCertificate(DeleteAcmeCertificateRequest) returns (DeleteAcmeCertificateReply) {
    option (google.api.http) = { delete: "/v1/acme/certificates/{id}" };
  }
  // ACME DNS-01 challenge provider configuration.
  rpc ListAcmeDnsProviders(ListAcmeDnsProvidersRequest) returns (ListAcmeDnsProvidersReply) {
    option (google.api.http) = { get: "/v1/acme/dns-providers" };
  }
  rpc GetAcmeDnsProvider(GetAcmeDnsProviderRequest) returns (AcmeDnsProvider) {
    option (google.api.http) = { get: "/v1/acme/dns-provider" };
  }
  rpc SetAcmeDnsProvider(SetAcmeDnsProviderRequest) returns (AcmeDnsProvider) {
    option (google.api.http) = { put: "/v1/acme/dns-provider" body: "*" };
  }
  rpc ClearAcmeDnsProvider(ClearAcmeDnsProviderRequest) returns (AcmeDnsProvider) {
    option (google.api.http) = { delete: "/v1/acme/dns-provider" };
  }

  rpc GetDashboardSummary(GetDashboardSummaryRequest) returns (DashboardSummary) {
    option (google.api.http) = { get: "/v1/dashboard/summary" };
  }
  // GetMetricsTimeseries returns curated mail-flow time-series (deliveries,
  // bounces, deferrals, receptions) from the configured Prometheus.
  rpc GetMetricsTimeseries(GetMetricsTimeseriesRequest) returns (MetricsTimeseries) {
    option (google.api.http) = { get: "/v1/dashboard/metrics" };
  }
  // GetWarmupDeliveryStats returns per-VMTA, per-recipient-domain delivery and
  // bounce rates over a lookback window — used to watch IP-warmup health.
  rpc GetWarmupDeliveryStats(GetWarmupDeliveryStatsRequest) returns (WarmupDeliveryStats) {
    option (google.api.http) = { get: "/v1/dashboard/warmup-stats" };
  }
  // CheckDomainBounceSetup verifies a domain's MX (accepts bounces here), SPF
  // (authorizes our egress IPs), and DKIM (selector records) via live DNS.
  rpc CheckDomainBounceSetup(CheckDomainBounceSetupRequest) returns (DomainBounceCheck) {
    option (google.api.http) = { get: "/v1/domain-check/{domain}" };
  }

  // Tools ---------------------------------------------------------------------
  // Diagnose reports how mail from a given address is handled and whether the
  // sending domain is set up correctly (DKIM/SPF/DMARC/MX/FBL + routing preview).
  rpc Diagnose(DiagnoseRequest) returns (DiagnoseResult) {
    option (google.api.http) = { post: "/v1/tools/diagnose" body: "*" };
  }
  // RblCheck tests the deployment's listener and VMTA egress IPs against DNS
  // blocklists.
  rpc RblCheck(RblCheckRequest) returns (RblCheckReply) {
    option (google.api.http) = { post: "/v1/tools/rbl-check" body: "*" };
  }

  // DMARC aggregate reports -----------------------------------------------------
  rpc GetDmarcStats(GetDmarcStatsRequest) returns (DmarcStats) {
    option (google.api.http) = { get: "/v1/dmarc/stats" };
  }
  rpc ListDmarcReports(ListDmarcReportsRequest) returns (ListDmarcReportsReply) {
    option (google.api.http) = { get: "/v1/dmarc/reports" };
  }
  rpc ListDmarcDomains(ListDmarcDomainsRequest) returns (ListDmarcDomainsReply) {
    option (google.api.http) = { get: "/v1/dmarc/domains" };
  }

  // Generic worker error log: Warn/Error events emitted by background workers
  // (e.g. an unparseable DMARC report dropped by the dmarc worker).
  rpc ListWorkerErrorLogs(ListWorkerErrorLogsRequest) returns (ListWorkerErrorLogsReply) {
    option (google.api.http) = { get: "/v1/worker-error-logs" };
  }

  // Retention: per-table TimescaleDB chunk compression/dropping for the event
  // hypertables, with live disk stats.
  rpc ListRetentionPolicies(ListRetentionPoliciesRequest) returns (ListRetentionPoliciesReply) {
    option (google.api.http) = { get: "/v1/retention" };
  }
  rpc UpdateRetentionPolicy(UpdateRetentionPolicyRequest) returns (RetentionPolicy) {
    option (google.api.http) = { put: "/v1/retention/{table_name}" body: "*" };
  }
  rpc RunRetention(RunRetentionRequest) returns (RunRetentionReply) {
    option (google.api.http) = { post: "/v1/retention:run" body: "*" };
  }

  // Global settings (deployment-level policy knobs editable in the UI).
  rpc GetGlobalSettings(GetGlobalSettingsRequest) returns (GlobalSettings) {
    option (google.api.http) = { get: "/v1/settings" };
  }
  rpc UpdateGlobalSettings(UpdateGlobalSettingsRequest) returns (GlobalSettings) {
    option (google.api.http) = { put: "/v1/settings" body: "*" };
  }

  // Subject classifications (rules for the optional subject-classification
  // feature; operator-authored plus AI-generated cache).
  rpc ListSubjectClassifications(ListSubjectClassificationsRequest) returns (ListSubjectClassificationsReply) {
    option (google.api.http) = { get: "/v1/subject-classifications" };
  }
  rpc CreateSubjectClassification(CreateSubjectClassificationRequest) returns (SubjectClassification) {
    option (google.api.http) = { post: "/v1/subject-classifications" body: "*" };
  }
  rpc UpdateSubjectClassification(UpdateSubjectClassificationRequest) returns (SubjectClassification) {
    option (google.api.http) = { put: "/v1/subject-classifications/{id}" body: "*" };
  }
  rpc DeleteSubjectClassification(DeleteSubjectClassificationRequest) returns (DeleteSubjectClassificationReply) {
    option (google.api.http) = { delete: "/v1/subject-classifications/{id}" };
  }
}

// Pagination ----------------------------------------------------------------
message PageRequest {
  int32 page_size = 1;
  string page_token = 2;
}
message PageReply {
  string next_page_token = 1;
}

// Outbound configuration ----------------------------------------------------
// Listener is an ESMTP listener: IP + port + EHLO hostname + TLS/relay config.
message Listener {
  string id = 1;
  string name = 2;
  string ip_address = 3;
  int32 port = 4;
  string hostname = 5;
  bool tls_enabled = 6;
  string tls_cert_path = 7;
  string tls_key_path = 8;
  bool require_auth = 9;
  int64 max_message_size = 10;
  repeated string relay_hosts = 11;
  string status = 12;
  string role = 13; // "inbound" (MX) | "submission"
}
message ListListenersRequest { PageRequest page = 1; }
message ListListenersReply {
  repeated Listener items = 1;
  PageReply page = 2;
}
message CreateListenerRequest {
  string name = 1;
  string ip_address = 2;
  int32 port = 3;
  string hostname = 4;
  bool tls_enabled = 5;
  string tls_cert_path = 6;
  string tls_key_path = 7;
  bool require_auth = 8;
  int64 max_message_size = 9;
  repeated string relay_hosts = 10;
  string role = 11; // "inbound" (default) | "submission"
}
message UpdateListenerRequest {
  string id = 1;
  string name = 2;
  string ip_address = 3;
  int32 port = 4;
  string hostname = 5;
  bool tls_enabled = 6;
  string tls_cert_path = 7;
  string tls_key_path = 8;
  bool require_auth = 9;
  int64 max_message_size = 10;
  repeated string relay_hosts = 11;
  string status = 12;
  string role = 13; // "inbound" | "submission"
}

// VMTA is a self-contained outbound sending identity that OWNS its egress
// ip_address and ehlo_name (3.0.0). listener_id/listener_name are an optional
// association only; listener_name is read-only.
message VMTA {
  string id = 1;
  string name = 2;
  string ip_address = 3;
  string ehlo_name = 4;
  string status = 5;
  string notes = 6;
  string listener_id = 7;
  string listener_name = 8;
  int32 max_connections = 9;
}
message VMTAGroup {
  string id = 1;
  string name = 2;
  string status = 3;
  repeated VMTAGroupMember members = 4;
}
message VMTAGroupMember {
  string vmta_id = 1;
  int32 weight = 2;
}
message RoutingRule {
  string id = 1;
  string name = 2;
  string match_type = 3;
  string match_value = 4;
  int32 priority = 5;
  string target_type = 6;
  string target_id = 7;
  string status = 8;
  // match_header is the header NAME for a mailclass match (e.g. "X-Mail-Class").
  // Empty for recipient matches.
  string match_header = 9;
  // assign_mailclass is the class applied by a sender_ip rule (match_value is
  // then an IP or CIDR). Empty for other match types, which use target instead.
  string assign_mailclass = 10;
}

// ---- IP warmup ----
message WarmupStage {
  int32 day_from = 1;
  int32 day_to = 2;
  map<string, int32> caps = 3; // MBP bucket -> messages/day
}
message WarmupSchedule {
  string id = 1;
  string vmta_id = 2;
  string vmta_name = 3;
  string start_date = 4; // YYYY-MM-DD (day 1 of the ramp)
  string curve = 5;
  repeated WarmupStage stages = 6;
  string status = 7; // scheduled | active | paused | completed
  string paused_reason = 8;
  int32 held_day = 9;
  string created_at = 10;
  string updated_at = 11;
}
message WarmupCurve {
  string name = 1;
  repeated WarmupStage stages = 2;
}
message ListWarmupSchedulesRequest {
  PageRequest page = 1;
  string status = 2;
}
message ListWarmupSchedulesReply {
  repeated WarmupSchedule items = 1;
  PageReply page = 2;
  repeated WarmupCurve curves = 3; // built-in templates for the editor
}
message CreateWarmupScheduleRequest {
  string vmta_id = 1;
  string start_date = 2; // YYYY-MM-DD
  string curve = 3;
  repeated WarmupStage stages = 4; // required when curve = "custom"
}
message UpdateWarmupScheduleRequest {
  string id = 1;
  string start_date = 2;
  string curve = 3;
  repeated WarmupStage stages = 4; // required when curve = "custom"
}
message PauseWarmupScheduleRequest {
  string id = 1;
  string reason = 2;
}
message ResumeWarmupScheduleRequest {
  string id = 1;
}

// ---- Delivery blueprints ----
message DeliveryBlueprint {
  string id = 1;
  string provider = 2;
  string mx_pattern = 3;
  string conn_rate = 4; // max_connection_rate, e.g. "5/min"
  int32 deliveries_per_conn = 5;
  int32 conn_limit = 6;
  int32 daily_cap = 7; // base max_message_rate, messages/day
  string status = 8;
  string created_at = 9;
  string updated_at = 10;
}
message ListDeliveryBlueprintsRequest {}
message ListDeliveryBlueprintsReply {
  repeated DeliveryBlueprint items = 1;
}
message CreateDeliveryBlueprintRequest {
  string provider = 1;
  string mx_pattern = 2;
