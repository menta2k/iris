// Mail operations -----------------------------------------------------------
message MailRecord {
  string id = 1;
  string message_id = 2;
  google.protobuf.Timestamp event_time = 3;
  string mailclass = 4;
  string sender = 5;
  string recipient = 6;
  string recipient_domain = 7;
  string vmta_id = 8;
  string status = 9;
  // Original From header. The envelope sender is VERP-rewritten at reception,
  // so it no longer reflects who the mail was from.
  string from_header = 10;
  // SMTP response for this event: the code (e.g. "451") and the server's text.
  // Present on Delivery/TransientFailure/Bounce; empty on Reception. Lets the
  // Logs UI show why a message deferred or bounced.
  string smtp_status = 11;
  string diagnostic = 12;
  // EgressSource is the sending VMTA's name for this event (Delivery/Bounce/
  // TransientFailure); empty on Reception.
  string egress_source = 13;
  // RecordType is the raw KumoMTA log record type (Reception/Delivery/Bounce/
  // TransientFailure/AdminBounce/Expiration). Distinguishes the three types that
  // share status="bounced".
  string record_type = 14;
  // Optional subject-derived classification label (≤2 words). Populated by the
  // classification worker on the Reception row; empty when the feature is off or
  // not yet resolved. The raw subject is never returned — only the label.
  string classification = 15;
  // Cluster node that received/queued the message; the whole lifecycle logs
  // from this node. Empty on pre-cluster rows.
  string node = 16;
}
message Bounce {
  string id = 1;
  google.protobuf.Timestamp event_time = 2;
  string recipient = 3;
  string mailclass = 4;
  string smtp_status = 5;
  string bounce_type = 6;
  string diagnostic = 7;
  string processing_state = 8;
  // classification is KumoMTA's bounce-classifier category (InvalidRecipient,
  // SpamBlock, …); empty when the classifier is disabled or no rule matched.
  string classification = 9;
}
message FeedbackReport {
  string id = 1;
  google.protobuf.Timestamp received_at = 2;
  string source = 3;
  string report_type = 4;
  string recipient = 5;
  string processing_state = 6;
}
// Queue is a live kumod scheduled-queue summary for one destination domain.
message Queue {
  string domain = 1;
  int64 depth = 2;
  bool suspended = 3;
  string suspend_reason = 4;
}

message ListMailRecordsRequest {
  PageRequest page = 1;
  string mailclass = 2;
  string sender = 3;
  string recipient = 4;
  // Filters by egress source = the sending VMTA's name (e.g. "vmta-1").
  string vmta_id = 5;
  google.protobuf.Timestamp from_time = 6;
  google.protobuf.Timestamp to_time = 7;
  // Case-insensitive substring match on the original From header.
  string from = 8;
  // Filter by mail-record status (e.g. "deferred" to see what's in the queue).
  string status = 9;
  // Filter by raw KumoMTA log record type (e.g. "AdminBounce"). Empty = all.
  string record_type = 10;
  // Case-insensitive substring match on the SMTP diagnostic / response text
  // (e.g. "quota", "STARTTLS", "NXDOMAIN"). Empty = all.
  string diagnostic = 11;
  // Filter by receiving cluster node name. Empty = all.
  string node = 12;
}
message ListMailRecordsReply {
  repeated MailRecord items = 1;
  PageReply page = 2;
}
message GetNextDeliveryAttemptRequest {
  string message_id = 1;
}
// Estimated retry schedule for a deferred message (empty/deferred=false when the
// message already reached a terminal outcome). Times are RFC3339 UTC.
message NextDeliveryAttempt {
  bool deferred = 1;
  int32 attempts = 2;             // transient failures so far
  string last_attempt = 3;        // time of the most recent deferral
  string next_attempt = 4;        // estimated next delivery attempt
  int32 remaining_attempts = 5;   // future attempts before expiry (incl. next)
  string final_attempt = 6;       // last attempt that fits before expiry
  bool will_expire = 7;           // next attempt would exceed max_age
  string expires_at = 8;          // creation time + max_age
  string interval = 9;            // delay until the next attempt (e.g. "1h20m")
}
message ListBouncesRequest {
  PageRequest page = 1;
  // Case-insensitive substring match on the recipient address.
  string recipient = 2;
  string mailclass = 3;
  // Filter by bounce type (hard | soft | dsn). Empty = all.
  string bounce_type = 4;
  // Case-insensitive substring match on the classifier category.
  string classification = 5;
  // Filter by processing state (new | processing | processed | suppressed | retried).
  string processing_state = 6;
  google.protobuf.Timestamp from_time = 7;
  google.protobuf.Timestamp to_time = 8;
}
message ListBouncesReply {
  repeated Bounce items = 1;
  PageReply page = 2;
}
message ListDsnMessagesRequest { string recipient = 1; }
message ListDsnMessagesReply { repeated DsnMessage items = 1; }
message ListFeedbackReportsRequest { PageRequest page = 1; }
message ListFeedbackReportsReply {
  repeated FeedbackReport items = 1;
  PageReply page = 2;
}
message ListQueuesRequest { PageRequest page = 1; }
message ListQueuesReply {
  repeated Queue items = 1;
  PageReply page = 2;
}
message RequestQueueActionRequest {
  string action = 1;          // suspend | resume | bounce
  string domain = 2;          // destination domain (scheduled queue)
  string reason = 3;
  string confirmation_id = 4; // required for the destructive bounce
}
message QueueActionReply {
  string status = 1;
  string summary = 2;
}

// Domain & recipient safety -------------------------------------------------
message DKIMDomain {
  string id = 1;
  string domain = 2;
  string selector = 3;
  string public_key_fingerprint = 4;
  string status = 5;
}
message Suppression {
  string id = 1;
  string type = 2;
  string value = 3;
  string reason = 4;
  string source = 5;
  string status = 6;
  string mailclass = 7; // class of the event that triggered it (empty if manual)
  string created_at = 8; // RFC3339 — when the entry was recorded
  string expires_at = 9; // RFC3339 — when it stops blocking; empty = permanent
}

message ListDKIMDomainsRequest { PageRequest page = 1; }
message ListDKIMDomainsReply {
  repeated DKIMDomain items = 1;
  PageReply page = 2;
}
message CreateDKIMDomainRequest {
  string domain = 1;
  string selector = 2;
  string public_key_fingerprint = 3;
  string private_key_ref = 4;
}
message UpdateDKIMDomainRequest {
  string id = 1;
  string selector = 2;
  string public_key_fingerprint = 3;
  // PEM-encoded RSA private key; empty preserves the stored key.
  string private_key_ref = 4;
  string status = 5;
}
message GenerateDKIMKeyRequest {
  string domain = 1;
  string selector = 2;
}
message GenerateDKIMKeyReply {
  // PEM private key to store on the domain (save it on the DKIM record).
  string private_key_pem = 1;
  // DNS TXT record to publish: name and value.
  string record_name = 2;
  string record_value = 3;
  string public_key_fingerprint = 4;
}
message ListSuppressionsRequest {
  PageRequest page = 1;
  string search = 2;    // case-insensitive substring match on the suppressed value
  string type = 3;      // email | domain; empty = all
  string status = 4;    // active | disabled | expired; empty = all
  string source = 5;    // manual | bounce | feedback | dsn; empty = all
  string mailclass = 6; // exact match; empty = all
  // sort column: value|type|source|status|mailclass|reason|created_at|expires_at
  // (empty/unknown defaults to value). desc requests descending order.
  string sort = 7;
  bool desc = 8;
}
message ListSuppressionsReply {
  repeated Suppression items = 1;
  PageReply page = 2;
}
message CreateSuppressionRequest {
  string type = 1;
  string value = 2;
  string reason = 3;
}
message UpdateSuppressionRequest {
  string id = 1;
  string reason = 2;
  string status = 3;
}

// DsnMessage is a raw asynchronous bounce (DSN) archived at the bounce domain.
message DsnMessage {
  string id = 1;
  string message_id = 2;
  string raw_message = 3;
  string received_at = 4; // RFC3339
}
message ListSuppressionDsnMessagesRequest { string id = 1; }
message ListSuppressionDsnMessagesReply { repeated DsnMessage items = 1; }

// TLSPolicy requires TLS on outbound delivery to a destination domain. mode is
// "required" (STARTTLS + valid cert) or "required_insecure" (STARTTLS, skip
// cert validation).
message TLSPolicy {
  string id = 1;
  string domain = 2;
  string mode = 3;
  string status = 4;
}
message ListTLSPoliciesRequest { PageRequest page = 1; }
message ListTLSPoliciesReply {
  repeated TLSPolicy items = 1;
  PageReply page = 2;
}
message CreateTLSPolicyRequest {
  string domain = 1;
  string mode = 2;
}
message DeleteTLSPolicyRequest { string id = 1; }
message DeleteTLSPolicyReply {}

// Inbound automation --------------------------------------------------------
// InboundRoute routes inbound mail for a recipient/domain to a maildir, a
// forwarding smarthost, or an HTTP webhook. Action-specific fields are only
// meaningful for the matching action. secret_ref is write-only (never returned).
message InboundRoute {
  string id = 1;
  string name = 2;
  string match_type = 3;   // recipient_email | recipient_domain
  string match_value = 4;
  string action = 5;       // maildir | forward | webhook
  int32 priority = 6;
  string status = 7;       // active | disabled
  // forward
  string forward_host = 8;
  int32 forward_port = 9;
  string forward_tls = 10; // none | opportunistic | required
  // maildir
  string maildir_path = 11;
  // webhook
  string destination_url = 12;
  int32 timeout_seconds = 13;
  string secret_ref = 14;  // write-only on create/update
  // rspamd scanning for this route: default | off | tag | enforce
  string spam_scan = 15;
}
message ListInboundRoutesRequest { PageRequest page = 1; }
message ListInboundRoutesReply {
  repeated InboundRoute items = 1;
  PageReply page = 2;
}
message CreateInboundRouteRequest {
  string name = 1;
  string match_type = 2;
  string match_value = 3;
  string action = 4;
  int32 priority = 5;
  string status = 6;
  string forward_host = 7;
  int32 forward_port = 8;
  string forward_tls = 9;
  string maildir_path = 10;
  string destination_url = 11;
  int32 timeout_seconds = 12;
  string secret_ref = 13;
  string spam_scan = 14;
}
message UpdateInboundRouteRequest {
  string id = 1;
  string name = 2;
  string match_type = 3;
  string match_value = 4;
  string action = 5;
  int32 priority = 6;
  string status = 7;
  string forward_host = 8;
  int32 forward_port = 9;
  string forward_tls = 10;
  string maildir_path = 11;
  string destination_url = 12;
  int32 timeout_seconds = 13;
  string secret_ref = 14;
  string spam_scan = 15;
}
message DeleteInboundRouteRequest { string id = 1; }
message DeleteInboundRouteReply { bool ok = 1; }

message RspamdResult {
  string id = 1;
  google.protobuf.Timestamp event_time = 2;
  string mail_record_id = 3;
  string action = 4;
  double score = 5;
  repeated string symbols = 6;
  string reason = 7;
  string message_id = 8;
  string recipient = 9;
}
message ListRspamdResultsRequest { PageRequest page = 1; }
message ListRspamdResultsReply {
  repeated RspamdResult items = 1;
  PageReply page = 2;
}

// Feedback loops ------------------------------------------------------------
message FeedbackLoop {
  string id = 1;
  string domain = 2;
