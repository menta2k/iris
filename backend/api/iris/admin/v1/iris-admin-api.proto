// Mail operations -----------------------------------------------------------
message MailRecord {
  string id = 1;
  string message_id = 2;
  google.protobuf.Timestamp event_time = 3;
  string mailclass = 4;
  string sender = 5;
  string recipient = 6;
  string recipient_domain = 7;
  string vmta_id = 8;
  string status = 9;
  // Original From header. The envelope sender is VERP-rewritten at reception,
  // so it no longer reflects who the mail was from.
  string from_header = 10;
  // SMTP response for this event: the code (e.g. "451") and the server's text.
  // Present on Delivery/TransientFailure/Bounce; empty on Reception. Lets the
  // Logs UI show why a message deferred or bounced.
  string smtp_status = 11;
  string diagnostic = 12;
  // EgressSource is the sending VMTA's name for this event (Delivery/Bounce/
  // TransientFailure); empty on Reception.
  string egress_source = 13;
  // RecordType is the raw KumoMTA log record type (Reception/Delivery/Bounce/
  // TransientFailure/AdminBounce/Expiration). Distinguishes the three types that
  // share status="bounced".
  string record_type = 14;
}
message Bounce {
  string id = 1;
  google.protobuf.Timestamp event_time = 2;
  string recipient = 3;
  string mailclass = 4;
  string smtp_status = 5;
  string bounce_type = 6;
  string diagnostic = 7;
  string processing_state = 8;
  // classification is KumoMTA's bounce-classifier category (InvalidRecipient,
  // SpamBlock, …); empty when the classifier is disabled or no rule matched.
  string classification = 9;
}
message FeedbackReport {
  string id = 1;
  google.protobuf.Timestamp received_at = 2;
  string source = 3;
  string report_type = 4;
  string recipient = 5;
  string processing_state = 6;
}
// Queue is a live kumod scheduled-queue summary for one destination domain.
message Queue {
  string domain = 1;
  int64 depth = 2;
  bool suspended = 3;
  string suspend_reason = 4;
}

message ListMailRecordsRequest {
  PageRequest page = 1;
  string mailclass = 2;
  string sender = 3;
  string recipient = 4;
  // Filters by egress source = the sending VMTA's name (e.g. "vmta-1").
  string vmta_id = 5;
  google.protobuf.Timestamp from_time = 6;
  google.protobuf.Timestamp to_time = 7;
  // Case-insensitive substring match on the original From header.
  string from = 8;
  // Filter by mail-record status (e.g. "deferred" to see what's in the queue).
  string status = 9;
  // Filter by raw KumoMTA log record type (e.g. "AdminBounce"). Empty = all.
  string record_type = 10;
}
message ListMailRecordsReply {
  repeated MailRecord items = 1;
  PageReply page = 2;
}
