  string mx_pattern = 2;
  string conn_rate = 3;
  int32 deliveries_per_conn = 4;
  int32 conn_limit = 5;
  int32 daily_cap = 6;
}
message UpdateDeliveryBlueprintRequest {
  string id = 1;
  string provider = 2;
  string mx_pattern = 3;
  string conn_rate = 4;
  int32 deliveries_per_conn = 5;
  int32 conn_limit = 6;
  int32 daily_cap = 7;
