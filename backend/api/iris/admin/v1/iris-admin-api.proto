  string name = 1;
  string widgets_json = 2;
  bool make_default = 3;
}
message UpdateUserDashboardRequest {
  string id = 1;
  string name = 2;
  string widgets_json = 3;
}
message DeleteUserDashboardRequest {
  string id = 1;
}
message DeleteUserDashboardResponse {}
