// ---- Bounce-based actions (classification & response rules) ----
message BounceRule {
  string id = 1;
  string smtp_code = 2;         // "421", "550", or "" (any)
  string enhanced_code = 3;     // "4.7.0", "5.1.1", or "" (any)
  string provider = 4;          // gmail | yahoo | microsoft | ... or "" (all)
  string pattern = 5;           // case-insensitive substring of the diagnostic
  string class = 6;             // soft | hard
  string category = 7;          // e.g. "Rate Limited"
  string action = 8;            // retry | throttle | suspend_domain | suppress
  string action_config = 9;     // throttle rate / suspend duration
  string suggested_action = 10; // operator guidance
  int32 priority = 11;
  string source = 12;           // default | overlay
  string status = 13;           // active | disabled
  string created_at = 14;
  string updated_at = 15;
  int32 min_attempts = 16;      // apply only after this many delivery attempts
  string suppress_ttl = 17;     // per-rule suppression lifetime (e.g. "30d")
}
message ListBounceRulesRequest {}
message ListBounceRulesReply {
  repeated BounceRule items = 1;
}
message CreateBounceRuleRequest {
  string smtp_code = 1;
  string enhanced_code = 2;
  string provider = 3;
  string pattern = 4;
  string class = 5;
  string category = 6;
  string action = 7;
  string action_config = 8;
  string suggested_action = 9;
  int32 priority = 10;
  int32 min_attempts = 11;
  string suppress_ttl = 12;
}
message UpdateBounceRuleRequest {
  string id = 1;
  string smtp_code = 2;
  string enhanced_code = 3;
  string provider = 4;
  string pattern = 5;
  string class = 6;
  string category = 7;
  string action = 8;
  string action_config = 9;
  string suggested_action = 10;
  int32 priority = 11;
  string status = 12;
  int32 min_attempts = 13;
  string suppress_ttl = 14;
}
message DeleteBounceRuleRequest {
  string id = 1;
}
message DeleteBounceRuleReply {}
message ResetBounceRulesRequest {}
// Test a bounce diagnostic against the current active ruleset.
message TestBounceDiagnosticRequest {
  string smtp_code = 1;
  string domain = 2;      // recipient domain (derives provider when blank)
  string diagnostic = 3;  // full SMTP response text
  int32 attempts = 4;     // delivery attempts so far (gates min_attempts rules)
}
message TestBounceDiagnosticReply {
  // The normalized signature the matcher evaluated.
  string smtp_code = 1;
  string enhanced_code = 2;
  string provider = 3;
  bool matched = 4;
  BounceRule rule = 5;      // the matched rule (unset when matched=false)
  string effective_action = 6; // matched action, or "retry" when nothing matched
}

// ---- Event Processor (forward events to external services) ----
message EventProcessor {
  string id = 1;
  string name = 2;
  repeated string event_types = 3;  // bounce | suppression_created | feedback_report | dmarc_received
  repeated string mailclasses = 4;  // empty = all classes
