// Security administration ---------------------------------------------------
message User {
  string id = 1;
  string email = 2;
  string display_name = 3;
  string status = 4;
  bool mfa_required = 5;
  repeated string roles = 6;
}
message AuditEntry {
  string id = 1;
  string occurred_at = 2;
  string actor_user_id = 3;
  string operation = 4;
  string target_type = 5;
  string target_id = 6;
  string outcome = 7;
  string ip_address = 8;
}

// Login status values carried in LoginReply.status:
//   "authenticated"           — token is fully usable; proceed into the app.
//   "mfa_required"            — credentials OK but a TOTP code is needed; call
//                               VerifyMFA with the returned (partial) token.
//   "mfa_enrollment_required" — credentials OK but the user must enroll MFA
//                               first; call EnrollMFA/ConfirmMFA with the token.
message LoginRequest {
  string email = 1;
  string password = 2;
}
message LoginReply {
  string token = 1;
  string status = 2;
  User user = 3;
  repeated string permissions = 4;
}
message VerifyMFARequest { string code = 1; }
message CurrentUserRequest {}
message CurrentUserReply {
  User user = 1;
  repeated string permissions = 2;
}
message ChangePasswordRequest {
  string current_password = 1;
  string new_password = 2;
}
message ChangePasswordReply {}
message LogoutRequest {}
message LogoutReply {}

message EnrollMFARequest {}
message EnrollMFAReply {
  // The shared secret and the otpauth:// URI to render as a QR code. Shown once.
  string secret = 1;
  string otpauth_uri = 2;
}
message ConfirmMFARequest { string code = 1; }
// On success a fresh, fully-authenticated session token is returned so the
// client can complete a first-login enrollment without a second round-trip.
message ConfirmMFAReply {
  bool enrolled = 1;
  string token = 2;
}
message DisableMFARequest {}
message DisableMFAReply {}
message ListUsersRequest { PageRequest page = 1; }
message ListUsersReply {
  repeated User items = 1;
  PageReply page = 2;
}
message CreateUserRequest {
  string email = 1;
  string display_name = 2;
  bool mfa_required = 3;
  repeated string roles = 4;
  // Initial password. If empty the account is created without a usable
  // password (login disabled until one is set).
  string password = 5;
}
message UpdateUserRequest {
  string id = 1;
  string display_name = 2;
  string status = 3;
  bool mfa_required = 4;
  repeated string roles = 5;
}
message ResetUserPasswordRequest {
  string id = 1;
  // New password; strength-validated server-side (>= 12 chars) and bcrypt-hashed.
  string password = 2;
}
message ResetUserPasswordReply {}
message ListAuditEntriesRequest { PageRequest page = 1; }
message ListAuditEntriesReply {
  repeated AuditEntry items = 1;
  PageReply page = 2;
}

// KumoMTA service & configuration -------------------------------------------
message RequestServiceControlRequest {
  string operation = 1;
  string confirmation_id = 2;
}
message ServiceControlRequest {
  string id = 1;
  string operation = 2;
  string status = 3;
}
message GenerateKumoConfigRequest {}
message KumoConfig {
  // The rendered KumoMTA policy (Lua).
  string content = 1;
  // Counts summarizing what the config contains.
  int32 vmta_count = 2;
  int32 pool_count = 3;
  int32 route_count = 4;
  int32 dkim_count = 5;
  int32 suppression_count = 6;
  // Hash of the rendered content for change detection.
  string checksum = 7;
  // valid is true when the rendered policy passed the Lua syntax lint.
  bool valid = 8;
  // lint_issues holds any syntax problems found while linting the policy.
  repeated string lint_issues = 9;
}
message ApplyKumoConfigRequest {
  string confirmation_id = 1;
}
message ApplyKumoConfigReply {
  string request_id = 1;
  string status = 2;
  string checksum = 3;
  string applied_path = 4;
  string result_summary = 5;
  // restarted is true when KumoMTA was restarted (init change) rather than reloaded.
  bool restarted = 6;
}
message GetAcmeAccountRequest {}
message SaveAcmeAccountRequest {
  string email = 1;
  string server_url = 2;
}
message AcmeAccount {
  string email = 1;
  string server_url = 2;
  bool configured = 3;
  bool registered = 4;
  string updated_at = 5;
}
message AcmeCertificate {
  string id = 1;
  string domain = 2;
  repeated string alt_names = 3;
  string challenge_type = 4;
  string cert_path = 5;
  string key_path = 6;
  string expires_at = 7;
  string last_renewed_at = 8;
  string status = 9;
  string last_error = 10;
}
