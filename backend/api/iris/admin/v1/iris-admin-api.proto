}
// WarmupDeliveryStat is one (VMTA, recipient-domain) row. delivery_rate and
// bounce_rate are fractions in [0,1] over terminal outcomes (sent + bounced);
// deferred is shown separately and is NOT in that denominator.
message WarmupDeliveryStat {
  string vmta_id = 1;          // empty when the egress source has no matching VMTA
  string vmta_name = 2;        // egress source name from the delivery log
  string recipient_domain = 3;
  int64 sent = 4;              // delivered
  int64 bounced = 5;           // permanent failure
  int64 deferred = 6;          // transient (4xx) — informational, not in rates
  int64 attempted = 7;         // sent + bounced (terminal outcomes)
  double delivery_rate = 8;    // sent / attempted
  double bounce_rate = 9;      // bounced / attempted
}
message WarmupDeliveryStats {
  repeated WarmupDeliveryStat rows = 1;
  string range = 2;            // echoed effective range
  int64 since = 3;             // unix seconds: window start
}

// Global settings — deployment-level policy knobs an operator edits in the UI.
message GlobalSettings {
  // rspamd inbound spam filtering: "off" | "tag" | "enforce".
  string rspamd_mode = 1;
  string rspamd_url = 2;
  // Default outbound EHLO hostname.
  string egress_ehlo_domain = 3;
  // Redis URL embedded in the policy log_hook (what KumoMTA reaches Redis at).
  string log_stream_redis_url = 4;
  // Default listener binds (host:port) emitted in the policy init.
  string esmtp_listen = 5;
  string http_listen = 6;
  // Delivery rates: the outbound retry schedule (KumoMTA duration form).
  string egress_retry_interval = 7;
  string egress_max_retry_interval = 8;
  string egress_max_age = 9;
  // Bounce / DSN pipeline.
  string bounce_domain = 10;
  bool auto_suppress_hard_bounces = 11;
  int32 soft_bounce_threshold = 12;
  // 13 was fbl_domains; FBL is now a per-entry resource (FeedbackLoop).
  reserved 13;
  // Iris admin server (applied on restart). admin_http_addr overrides the HTTP
  // bind; admin_tls_enabled serves HTTPS using the issued cert whose domain is
  // admin_tls_cert_domain.
  string admin_http_addr = 14;
  bool admin_tls_enabled = 15;
  string admin_tls_cert_domain = 16;
  // ACME auto-renew schedule (duration form, e.g. "12h", "30d").
  string acme_renew_interval = 17;
  string acme_renew_before = 18;
  // Prometheus base URL the dashboard metrics endpoint queries (empty disables).
  string prometheus_url = 19;
  string updated_at = 20;
  string updated_by = 21;
  // Suppression record lifetime (duration form, e.g. "720h", "30d"). Empty =
  // permanent. Applied as the Redis key TTL on the live suppression list.
  string suppression_ttl = 22;
  // DMARC aggregate-report address (advertised as rua=). Empty disables it.
  string dmarc_report_email = 23;
  // Gate FBL auto-suppression on proven provenance (X-KumoRef/send-log/DKIM).
  bool fbl_require_verification = 24;
  // Deployment-wide Maildir root for inbound maildir routes without their own
  // path (one Maildir per recipient under <base>/<domain>/<local-part>).
  string inbound_maildir_base_path = 25;
  // Per-sending-domain bounce (VERP return-path) template. When set, the
  // outbound envelope return-path is derived per From-domain by substituting
  // "{domain}" (e.g. "bounce.kumo.{domain}" → mail from @example.com uses
  // @bounce.kumo.example.com), so SPF aligns with the From-domain. Empty uses the
  // single global bounce_domain for all mail.
  string bounce_domain_template = 26;
  // Subject classification (optional; off by default). classify_subjects is the
  // toggle; classify_model / classify_threshold (0..1) / classify_api_base tune
  // the OpenAI-compatible LLM fallback. The API key comes from
  // IRIS_OPENAI_API_KEY and is never persisted here.
  bool classify_subjects = 27;
  string classify_model = 28;
  double classify_threshold = 29;
  string classify_api_base = 30;
}
message GetGlobalSettingsRequest {}
message UpdateGlobalSettingsRequest {
  string rspamd_mode = 1;
  string rspamd_url = 2;
  string egress_ehlo_domain = 3;
  string log_stream_redis_url = 4;
  string esmtp_listen = 5;
  string http_listen = 6;
  string egress_retry_interval = 7;
  string egress_max_retry_interval = 8;
  string egress_max_age = 9;
  string bounce_domain = 10;
  bool auto_suppress_hard_bounces = 11;
  int32 soft_bounce_threshold = 12;
  reserved 13; // was fbl_domains
  string admin_http_addr = 14;
  bool admin_tls_enabled = 15;
  string admin_tls_cert_domain = 16;
  string acme_renew_interval = 17;
  string acme_renew_before = 18;
  string prometheus_url = 19;
  string suppression_ttl = 20;
  string dmarc_report_email = 21;
  bool fbl_require_verification = 22;
  string inbound_maildir_base_path = 23;
  // Per-sending-domain bounce return-path template (see GlobalSettings).
  string bounce_domain_template = 24;
  // Subject classification knobs (see GlobalSettings).
  bool classify_subjects = 25;
  string classify_model = 26;
  double classify_threshold = 27;
  string classify_api_base = 28;
}

// A subject → label classification rule. source is "manual" (operator-authored)
// or "ai" (generated by the LLM fallback and cached). hit_count is how many
// messages matched it. subject_normalized is the trigram matching key.
message SubjectClassification {
  string id = 1;
  string subject = 2;
  string subject_normalized = 3;
  string label = 4;
  string source = 5;
  int64 hit_count = 6;
  string created_at = 7;
  string updated_at = 8;
}
message ListSubjectClassificationsRequest {}
message ListSubjectClassificationsReply {
  repeated SubjectClassification items = 1;
}
message CreateSubjectClassificationRequest {
  string subject = 1;
  string label = 2;
}
message UpdateSubjectClassificationRequest {
  string id = 1;
  string subject = 2;
  string label = 3;
}
message DeleteSubjectClassificationRequest {
  string id = 1;
}
message DeleteSubjectClassificationReply {
  bool ok = 1;
}
