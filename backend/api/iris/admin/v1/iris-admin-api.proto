  string label = 2; // human label for the legend
  repeated MetricPoint points = 3;
}
message MetricsTimeseries {
  repeated MetricsSeries series = 1;
  string range = 2;            // echoed effective range
  int64 step_seconds = 3;      // resolution between points
  bool prometheus_available = 4; // false when no Prometheus URL is configured
}

// UserDashboard is one operator-owned custom dashboard. widgets_json is an
