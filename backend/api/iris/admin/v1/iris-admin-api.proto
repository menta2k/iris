// DMARC aggregate reports.
message GetDmarcStatsRequest {
  string domain = 1;    // optional filter
  string from = 2;      // optional RFC3339
  string to = 3;        // optional RFC3339
  string reporter = 4;  // optional org_name filter — drill down to one reporter
}
message DmarcCount { string label = 1; int32 count = 2; }
message DmarcSource { string ip = 1; int32 total = 2; int32 pass = 3; int32 fail = 4; }
message DmarcDomainStat { string domain = 1; int32 messages = 2; int32 pass = 3; }
// DmarcReporterStat is a per-reporter (org_name) rollup — who sent the reports.
message DmarcReporterStat { string reporter = 1; int32 messages = 2; int32 pass = 3; }
message DmarcDay { string date = 1; int32 messages = 2; int32 pass = 3; }
message DmarcStats {
  int32 total_messages = 1;
  int32 dmarc_pass = 2;
  int32 spf_pass = 3;
  int32 dkim_pass = 4;
  repeated DmarcCount dispositions = 5;
  repeated DmarcSource top_sources = 6;
  repeated DmarcDomainStat domains = 7;
  repeated DmarcDay series = 8;
  // Per-reporter breakdown; ignores the reporter filter so the drill-down list
  // stays complete even when one reporter is selected.
  repeated DmarcReporterStat reporters = 9;
}
message DmarcReport {
  string org_name = 1;
  string report_id = 2;
  string domain = 3;
  string date_begin = 4;
  string date_end = 5;
  string policy_p = 6;
  int32 policy_pct = 7;
  string received_at = 8;
}
message ListDmarcReportsRequest { string domain = 1; PageRequest page = 2; }
message ListDmarcReportsReply { repeated DmarcReport items = 1; PageReply page = 2; }
message ListDmarcDomainsRequest {}
message ListDmarcDomainsReply { repeated string domains = 1; }

// Worker error log ----------------------------------------------------------
message WorkerErrorLog {
  string id = 1;
  string event_time = 2; // RFC3339
  string level = 3;      // "warn" | "error"
  string worker = 4;
  string message = 5;
  string detail = 6;     // structured slog attributes as a JSON object string
}
message ListWorkerErrorLogsRequest {
  string level = 1;  // "" | "warn" | "error"
  string worker = 2;
  string from = 3;   // RFC3339, optional lower bound on event_time
  string to = 4;     // RFC3339, optional upper bound on event_time
  PageRequest page = 5;
}
message ListWorkerErrorLogsReply {
  repeated WorkerErrorLog items = 1;
  PageReply page = 2;
}

// Retention -----------------------------------------------------------------
message RetentionPolicy {
  string table_name = 1;
  int32 retention_days = 2;       // 0 = keep forever
  int32 compress_after_days = 3;  // 0 = no compression
  bool enabled = 4;
  string updated_at = 5;
  string updated_by = 6;
}
// RetentionView is a policy plus live disk status for one managed table.
message RetentionView {
  RetentionPolicy policy = 1;
  string label = 2;
  bool hypertable = 3;            // false on plain PostgreSQL — retention unavailable
  int64 chunk_count = 4;
  int64 compressed_chunks = 5;
  int64 total_bytes = 6;
  int64 compressed_bytes = 7;
  int64 uncompressed_bytes = 8;
  string oldest_data = 9;         // RFC3339, empty if none
  string newest_data = 10;
  RetentionRun last_run = 11;
}
message RetentionRun {
  string id = 1;
  string table_name = 2;
  string started_at = 3;
  string finished_at = 4;
  int32 chunks_compressed = 5;
  int32 chunks_dropped = 6;
  int64 bytes_before = 7;
  int64 bytes_after = 8;
  string error = 9;
}
message ListRetentionPoliciesRequest {}
message ListRetentionPoliciesReply { repeated RetentionView items = 1; }
message UpdateRetentionPolicyRequest {
  string table_name = 1;
  int32 retention_days = 2;
  int32 compress_after_days = 3;
  bool enabled = 4;
}
message RunRetentionRequest { string table_name = 1; } // empty = all tables
message RunRetentionReply { bool ok = 1; }

message GetDashboardSummaryRequest {}
message DashboardSummary {
  string service_state = 1;
  int64 queued_messages = 2;
  int64 recent_mail_events = 3;
  int64 recent_audit_events = 4;
  // deferred_in_queue counts messages currently deferred in the queue: they
  // logged a transient failure but no terminal delivery/bounce since — still
  // retrying, not yet bounced.
  int64 deferred_in_queue = 5;
  // Live kumod state aggregated across cluster nodes (worst state wins), and
  // the nodes dragging it down (e.g. "node2=unreachable"); empty when all run.
  string kumo_state = 6;
  string kumo_detail = 7;
}

// GetMetricsTimeseries selects the lookback window: "1h" | "6h" | "24h" | "7d"
// (empty defaults to "6h").
message GetMetricsTimeseriesRequest {
  string range = 1;
}
message GetSystemMetricsRequest {
  string range = 1;
}
